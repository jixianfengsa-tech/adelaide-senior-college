<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>老年大学同学之间</title>
<style>
:root{--bg:#FFF8F0;--card:#FFF;--warm:#E8D5B7;--gold:#C4A44A;--navy:#2C3E50;--green:#6B8E6B;--pink:#E8A0A0;--text:#3D3D3D;--gray:#999;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.7;background:var(--bg);font-size:18px}
.container{max-width:700px;margin:0 auto;padding:0 14px}
.header{background:linear-gradient(160deg,#5B7B6C,#6B8E6B);color:#fff;padding:18px 14px;text-align:center;position:sticky;top:0;z-index:100;border-radius:0 0 20px 20px}
.header h1{font-size:24px;font-weight:900}.header .sub{font-size:14px;opacity:.9;margin-top:2px}
.header .sub a{color:rgba(255,255,255,.8);text-decoration:none}
.header .notify{position:absolute;right:16px;top:16px;font-size:24px;cursor:pointer}
.header .notify .badge{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:#E74C3C;border-radius:50%;font-size:11px;color:#fff;display:flex;align-items:center;justify-content:center;display:none}
.user-strip{display:flex;align-items:center;gap:12px;padding:12px 0}
.user-avatar{width:48px;height:48px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;cursor:pointer}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1}.user-name{font-weight:700;font-size:18px;color:var(--navy)}.user-level{font-size:14px;color:var(--gold)}
.btn-sm{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:var(--navy);color:#fff}
.btn-sm.guest{background:var(--gold)}

/* Big category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.cat-box{background:var(--card);border-radius:var(--radius);padding:18px 10px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all .2s;text-decoration:none;color:inherit}
.cat-box:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.cat-box .c-icon{font-size:32px;display:block;margin-bottom:6px}
.cat-box .c-name{font-size:15px;font-weight:700;color:var(--navy)}

.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.sec-title{font-size:20px;font-weight:800;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:0;margin-bottom:12px;background:var(--warm);border-radius:25px;padding:3px}
.tab-btn{flex:1;padding:10px;border-radius:22px;border:none;background:transparent;font-size:16px;font-weight:600;cursor:pointer;color:var(--gray)}
.tab-btn.active{background:#fff;color:var(--navy);box-shadow:0 2px 6px rgba(0,0,0,.08)}

.checkin-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);text-align:center}
.mood-picker{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.mood-btn{padding:10px 16px;border-radius:20px;border:2px solid var(--warm);background:#fff;font-size:16px;cursor:pointer}
.mood-btn:hover{border-color:var(--gold)}

.post-card{cursor:pointer}.post-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.post-pavatar{width:40px;height:40px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.post-pavatar img{width:100%;height:100%;object-fit:cover}
.post-meta{flex:1}.post-author{font-weight:600;color:var(--navy);font-size:16px}.post-time{font-size:13px;color:var(--gray)}
.post-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px}
.post-preview{font-size:16px;color:#666;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:8px}
.post-actions{display:flex;gap:12px;font-size:14px;color:var(--gray);align-items:center;flex-wrap:wrap}
.react-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--warm);background:#fff;cursor:pointer;font-size:16px}
.react-btn.liked{background:rgba(231,76,60,.1);border-color:#E74C3C}

.fab{position:fixed;bottom:24px;right:20px;background:var(--gold);color:#fff;border:none;border-radius:30px;padding:14px 24px;font-size:18px;font-weight:700;cursor:pointer;z-index:200;box-shadow:0 6px 20px rgba(196,164,74,.4)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;padding:24px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-close{float:right;font-size:24px;cursor:pointer;color:var(--gray);background:none;border:none}
.modal h2{font-size:22px;color:var(--navy);margin-bottom:16px}
.modal input,.modal textarea,.modal select{width:100%;padding:14px;border:2px solid var(--warm);border-radius:12px;font-size:17px;font-family:inherit;margin-bottom:12px;background:#FAFAFA}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--gold);background:#fff}
.btn-submit{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 28px;border-radius:25px;font-size:16px;z-index:99999;animation:fadeInOut 2.5s ease forwards}
@keyframes fadeInOut{0%{opacity:0;top:0}15%{opacity:1;top:20px}85%{opacity:1;top:20px}100%{opacity:0;top:0}}
.retry-btn{padding:10px 24px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;margin-top:8px}
@media(max-width:480px){body{font-size:16px}.header h1{font-size:20px}.cat-grid{grid-template-columns:repeat(3,1fr);gap:6px}.cat-box{padding:14px 6px}.cat-box .c-name{font-size:13px}}
</style>
</head>
<body>

<div class="header">
    <h1>🏫 老年大学同学之间</h1>
    <p class="sub">看通知、聊课程、找同伴、互相帮助 · <a href="/">← 返回主页</a></p>
    <div class="notify" onclick="showNotifications()">🔔<span class="badge" id="notifyBadge">0</span></div>
</div>

<div class="container">
<div class="user-strip" id="userStrip">
    <div class="user-avatar" id="uAvatar" onclick="showProfile()">🐼</div>
    <div class="user-info"><div class="user-name" id="uName">游客</div><div class="user-level" id="uLevel"></div></div>
    <a href="admin.html" id="adminLink" style="font-size:13px;color:var(--gold);text-decoration:none;display:none" onclick="localStorage.setItem('f_is_admin','1')">🛡️ 管理</a>
    <button class="btn-sm guest" id="loginBtn" onclick="doLogin()">登录</button>
</div>

<!-- Big Categories -->
<div class="cat-grid">
    <div class="cat-box" onclick="switchCat('1')"><span class="c-icon">📢</span><span class="c-name">校园通知</span></div>
    <div class="cat-box" onclick="switchCat('2')"><span class="c-icon">💬</span><span class="c-name">同学交流</span></div>
    <div class="cat-box" onclick="switchCat('3')"><span class="c-icon">🚶</span><span class="c-name">活动约伴</span></div>
    <div class="cat-box" onclick="switchCat('4')"><span class="c-icon">❓</span><span class="c-name">生活求助</span></div>
    <div class="cat-box" onclick="switchCat('5')"><span class="c-icon">🛒</span><span class="c-name">闲置分享</span></div>
    <div class="cat-box" onclick="switchCat('6')"><span class="c-icon">📖</span><span class="c-name">人生故事</span></div>
</div>

<!-- Check-in -->
<div class="checkin-card" id="checkinCard">
    <h3>🌞 今日签到 <span id="checkinCount" style="font-size:14px;color:var(--gray)"></span></h3>
    <button class="mood-btn" onclick="doCheckin()" id="checkinBtn" style="font-size:18px;padding:12px 24px">✅ 今日签到</button>
    <div class="mood-picker" id="moodPicker" style="display:none">
        <span class="mood-btn" onclick="pickMood('😊','开心')">😊</span><span class="mood-btn" onclick="pickMood('😌','平静')">😌</span>
        <span class="mood-btn" onclick="pickMood('🥰','充实')">🥰</span><span class="mood-btn" onclick="pickMood('😴','有点累')">😴</span><span class="mood-btn" onclick="pickMood('🌹','想聊天')">🌹</span>
    </div>
</div>

<!-- Hot / Leaderboard -->
<div class="card"><div class="sec-title">🔥 热门讨论</div><div id="hotPosts">加载中...</div></div>
<div class="card"><div class="sec-title">🌟 本月热心同学</div><div id="leaderboard">加载中...</div></div>
<div class="card" id="birthdayCard" style="display:none"><div class="sec-title">🎂 本月寿星</div><div id="birthdayList"></div></div>

<!-- Tabs + Posts -->
<div class="tabs"><button class="tab-btn active" onclick="switchTab('newest')">最新发言</button><button class="tab-btn" onclick="switchTab('hot')">热门讨论</button></div>
<div id="postList"><p style="text-align:center;color:var(--gray);padding:40px">加载中...</p></div>
<div id="debug" style="text-align:center;font-size:11px;color:#ccc"></div>
</div>

<button class="fab" onclick="showNewPost()">✏️ 我要发言</button>

<!-- Post Modal -->
<div class="modal-overlay" id="postModal"><div class="modal">
    <button class="modal-close" onclick="closeM('postModal')">✕</button>
    <h2>✏️ 我要发言</h2>
    <select id="postCat"><option value="">选择版块</option></select>
    <input id="postTitle" placeholder="标题（可选）" maxlength="100">
    <textarea id="postContent" rows="4" placeholder="说点什么吧..."></textarea>
    <input type="file" id="postImage" accept="image/*,.heic,.heif" multiple style="font-size:14px">
    <p style="font-size:12px;color:var(--gray);margin-bottom:8px">支持 JPG/PNG/HEIC/微信图片，自动压缩</p>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:15px"><input type="checkbox" id="allowComments" checked> 允许评论</label>
    <button class="btn-submit" id="postSubmitBtn" onclick="submitPost()">发布</button>
</div></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal"><div class="modal" id="detailContent"></div></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('loginModal')">✕</button>
    <h2>👋 登录同学之家</h2>
    <p style="color:var(--gray);margin-bottom:16px">登录后才能发言、点赞和签到</p>
    <button onclick="loginGoogle()" style="width:100%;padding:16px;background:#fff;border:2px solid #ddd;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:12px">🌐 Google 登录</button>
    <div style="color:var(--gray);margin:16px 0">— 或 —</div>
    <input id="guestNickname" placeholder="输入昵称" maxlength="20" style="text-align:center;font-size:18px;padding:14px;width:100%;border:2px solid var(--warm);border-radius:12px;margin-bottom:8px">
    <button onclick="loginAsGuest()" style="width:100%;padding:16px;background:var(--warm);color:var(--navy);border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer">以游客身份浏览</button>
    <p style="font-size:12px;color:var(--gray);margin-top:12px">游客可以浏览，发言需登录</p>
</div></div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('profileModal')">✕</button>
    <h2>✏️ 个人资料</h2>
    <div id="avatarPicker" style="font-size:34px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px"></div>
    <div id="profileStats" style="font-size:14px;color:var(--gray);margin:8px 0"></div>
    <div id="profileAchs" style="font-size:14px;color:var(--gold);margin:8px 0"></div>
    <input id="profileNickname" placeholder="昵称" maxlength="20" style="text-align:center;font-size:18px">
    <button onclick="setBirthday()" style="width:100%;padding:10px;background:var(--warm);border:none;border-radius:12px;font-size:14px;cursor:pointer;margin-bottom:8px">🎂 设置生日</button>
    <button onclick="saveProfile()" style="width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer">保存</button>
</div></div>

<!-- Birthday Modal -->
<div class="modal-overlay" id="birthModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('birthModal')">✕</button>
    <h2>🎂 选择生日月份</h2>
    <p id="birthSelected" style="color:var(--gold);font-size:18px;font-weight:700;margin:8px 0">请点击选择</p>
    <div id="birthGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:320px;margin:20px auto"></div>
    <button onclick="confirmBirth()" style="width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:12px">✅ 确定</button>
</div></div>

<div id="toast"></div>

<div class="modal-overlay" id="notifyModal"><div class="modal"><button class="modal-close" onclick="closeM('notifyModal')">✕</button><h2>🔔 通知中心</h2><div id="notifyList"><p style="color:var(--gray)">暂无通知</p></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const API='https://nkvavgmvbmzrnwurazgq.supabase.co/rest/v1',KEY='sb_publishable_fOyq5agLNbcFEJ-LrpYa_w_C6rjQGxZ';
const H={'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
let me=null,cat='all',cats=[],posts=[],isAdmin=false,sbAuth=null,currentTab='newest',submitting=false;
let tempAvatar=null,selectedBirthMonth=null,pendingLoginAction=null;

function $(id){return document.getElementById(id)}
function D(m){const e=$('debug');if(e)e.textContent='🔍 '+m}
function closeM(id){$(id).classList.remove('active')}
function toast(m){const e=$('toast');e.textContent=m;e.style.animation='none';e.offsetHeight;e.style.animation='fadeInOut 2.5s ease forwards'}
function ago(d){const s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return new Date(d).toLocaleDateString('zh-CN')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function emoji(s){const a=['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸'];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return a[Math.abs(h)%a.length]}
function getSB(){if(!sbAuth&&window.supabase)sbAuth=window.supabase.createClient('https://nkvavgmvbmzrnwurazgq.supabase.co',KEY);return sbAuth}
async function api(path,opt={}){
    const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),8000);
    try{const r=await fetch(API+path,{headers:{...H,'Cache-Control':'no-cache'},signal:controller.signal,...opt});clearTimeout(timer);
    if(!r.ok)throw new Error(r.status);return r.json()}catch(e){clearTimeout(timer);throw e}
}

// ==== AUTH ====
async function checkGoogle(){
    const sb=getSB();if(!sb)return;
    try{const{data:{session}}=await sb.auth.getSession();
    if(session?.user){
        const saved=localStorage.getItem('f_user');
        if(saved){try{const p=JSON.parse(saved);if(p.login_type==='google'&&p.id===session.user.id){me=p;updateMe();return}}catch(e){}}
        me={id:session.user.id,nickname:session.user.user_metadata?.full_name||session.user.email?.split('@')[0]||'Google用户',login_type:'google',avatar_emoji:'🌐',points:0};
        localStorage.setItem('f_user',JSON.stringify(me));updateMe();
    }}catch(e){}
}
function checkAdmin(){if(me?.nickname==='sure')isAdmin=true}
async function loginGoogle(){
    const sb=getSB();if(!sb){toast('请刷新后重试');return}
    try{const redirectUrl=location.origin+location.pathname;
    const{error}=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:redirectUrl}});
    if(error){$('loginModal').innerHTML+=`<p style="color:#E74C3C;margin-top:12px">❌ 登录失败：${error.message}</p><button onclick="closeM('loginModal')" class="retry-btn">返回论坛</button>`}
    }catch(e){$('loginModal').innerHTML+=`<p style="color:#E74C3C;margin-top:12px">❌ 网络错误，请重试</p><button onclick="loginGoogle()" class="retry-btn">重新登录</button><button onclick="closeM('loginModal')" class="retry-btn" style="margin-left:8px">返回论坛</button>`}
}
function doLogin(){pendingLoginAction=null;$('loginModal').classList.add('active')}
function requireLogin(action){if(!me){pendingLoginAction=action;doLogin();return false}return true}
function loginAsGuest(){
    const n=$('guestNickname').value.trim();if(!n){toast('请输入昵称');return}
    me={nickname:n,login_type:'guest',avatar_emoji:emoji(n),points:parseInt(localStorage.getItem('f_points_'+n)||'0')};
    localStorage.setItem('f_user',JSON.stringify(me));checkAdmin();updateMe();closeM('loginModal');
    toast('👋 '+n+'！游客可以浏览，发言请登录');
    if(pendingLoginAction) pendingLoginAction();
}

// ==== PROFILE ====
function showProfile(){if(!me)return;$('profileNickname').value=me.nickname||'';tempAvatar=null;
    const av=['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸','🐵','🐔','🦄','🌐'];
    const isPhoto=me.avatar_emoji&&me.avatar_emoji.startsWith('data:');
    $('avatarPicker').innerHTML=av.map(a=>`<span onclick="pickAv('${a}')" style="cursor:pointer;padding:4px;border-radius:8px;background:${!isPhoto&&me.avatar_emoji===a?'var(--gold)':'transparent'}">${a}</span>`).join('')+
    `<div id="photoPreview" style="margin-top:8px">${isPhoto?`<div style="padding:8px;background:var(--gold);border-radius:8px;font-size:14px">📷 当前照片 <span onclick="me.avatar_emoji='🐼';showProfile()" style="cursor:pointer;margin-left:8px">✕</span></div>`:`<div onclick="$('avFile').click()" style="cursor:pointer;border:2px dashed var(--warm);border-radius:8px;padding:12px;font-size:15px">📷 上传照片</div>`}</div>
    <input type="file" id="avFile" accept="image/*" style="display:none" onchange="upAv(event)">`;
    const streak=parseInt(localStorage.getItem('f_checkin_streak_'+me.nickname)||'0');
    const thisMonth=adelaideToday().split('-')[1]; // MM
    let checkinDays=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('f_checkin_'+me.nickname)&&localStorage.getItem(k)&&localStorage.getItem(k).startsWith(new Date().getFullYear()+'-'+thisMonth))checkinDays++}
    const awards=getAchievements();
    $('profileAchs').innerHTML='<div style="text-align:left;font-size:14px;padding:8px">'+
        '🎓 身份：'+getRole()+'<br>'+
        '📅 加入：'+(me.created_at?ago(me.created_at):'今天')+'<br>'+
        '🔥 连续签到：'+streak+'天 ｜ 本月：'+checkinDays+'天<br>'+
        '✏️ 发帖：'+(me.total_posts||0)+' ｜ 💬 回复：'+(me.total_replies||0)+'<br>'+
        '❤️ 收到点赞：'+(parseInt(localStorage.getItem('f_likes_received_'+me.nickname)||'0'))+'<br>'+
        '⭐ 积分：'+(me.points||0)+' ｜ '+getLevel(me.points||0).name+'<br>'+
        (awards.length?'🏅 奖牌 ('+awards.length+'个)：'+awards.map(a=>a.icon+a.name).join(' '):'🏅 奖牌：暂无')+
        '</div>';
    $('profileModal').classList.add('active');
}
function pickAv(a){me.avatar_emoji=a;tempAvatar=null;showProfile()}
function upAv(e){
    const f=e.target.files[0];if(!f||f.size>1000000){toast('照片小于1MB');return}
    // Use object URL for fast preview on mobile
    tempAvatar=URL.createObjectURL(f);
    // Store file for later base64 conversion
    window._avFile=f;
    $('photoPreview').innerHTML=`<div style="text-align:center;padding:8px;background:rgba(196,164,74,.1);border-radius:12px">
        <img src="${tempAvatar}" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin-bottom:6px;border:3px solid var(--gold)">
        <div style="font-size:14px;color:var(--gray);margin-bottom:8px">预览</div>
        <button onclick="confirmPhoto()" style="padding:12px 28px;background:var(--green);color:#fff;border:none;border-radius:25px;font-size:18px;font-weight:700;cursor:pointer;display:block;margin:8px auto">✅ 确认使用</button>

let page=1,hasMore=true;

async function loadHot(){try{const data=await api('/posts?select=*&order=reply_count.desc&limit=5');$('hotPosts').innerHTML=data.length?data.map((p,i)=>`<div class="post-card" onclick="showDetail(${p.id})" style="padding:12px"><span style="font-size:18px;font-weight:900;color:${['#E74C3C','#E67E22','#F39C12'][i]||'var(--gray)'}">${['🥇','🥈','🥉'][i]||i+1}</span> ${esc(p.title||'无标题')} <span style="font-size:13px;color:var(--gray)">💬${p.reply_count||0}</span></div>`).join(''):'<p style="color:var(--gray)">暂无热门讨论</p>'}catch(e){$('hotPosts').innerHTML='<button class="retry-btn" onclick="loadHot()">点击重试</button>'}}
async function loadLB(){
    // Monthly leaderboard: combine checkins + posts + replies + likes received
    const scores={},reasons={};
    const thisMonth=adelaideToday().split('-')[1];
    for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('f_checkin_')&&localStorage.getItem(k)&&localStorage.getItem(k).split('-')[1]===thisMonth){
            const n=k.replace('f_checkin_','');scores[n]=(scores[n]||0)+1;reasons[n]='连续活跃';
        }
        if(k&&k.startsWith('f_likes_received_')){
            const n=k.replace('f_likes_received_','');scores[n]=(scores[n]||0)+parseInt(localStorage.getItem(k)||'0');reasons[n]='受欢迎';
        }
    }
    // Also check posts from API for this month
    try{const data=await api('/posts?select=guest_nickname&order=created_at.desc&limit=200');data.forEach(p=>{if(p.guest_nickname){scores[p.guest_nickname]=(scores[p.guest_nickname]||0)+2}})})}catch(e){}
    const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,5);
    $('leaderboard').innerHTML=sorted.length?sorted.map(([n,c],i)=>`<div style="padding:6px 0;font-size:16px"><span style="font-size:20px">${emoji(n)}</span> ${n} <span style="color:var(--gray);font-size:13px">· ${reasons[n]||'活跃'} · ${c}分</span></div>`).join(''):'<p style="color:var(--gray)">暂无数据</p>';
}

// ==== NOTIFICATIONS ====
function addNotify(target,type,msg,linkId){
    if(!target||target===me?.nickname)return; // Don't notify self
    const key='f_ntfy_'+target;
    const list=JSON.parse(localStorage.getItem(key)||'[]');
    // Deduplicate: same type+linkId within last 24h
    if(list.some(n=>n.type===type&&n.linkId===linkId&&Date.now()-n.time<86400000))return;
    list.unshift({type,msg,linkId,time:Date.now(),read:false});
    if(list.length>50)list.length=50;
    localStorage.setItem(key,JSON.stringify(list));
    updateNotifyBadge();
}
function updateNotifyBadge(){
    if(!me)return;
    const list=JSON.parse(localStorage.getItem('f_ntfy_'+me.nickname)||'[]');
    const unread=list.filter(n=>!n.read).length;
    const badge=$('notifyBadge');
    if(unread>0){badge.style.display='flex';badge.textContent=unread>99?'99+':unread}else{badge.style.display='none'}
}
function showNotifications(){
    if(!me){doLogin();return}
    const list=JSON.parse(localStorage.getItem('f_ntfy_'+me.nickname)||'[]');
    if(!list.length){$('notifyList').innerHTML='<p style="color:var(--gray);text-align:center;padding:20px">🔔 暂无通知</p>'}else{
        $('notifyList').innerHTML=list.map(n=>`<div style="padding:12px;border-bottom:1px solid #f0f0f0;${n.read?'opacity:0.6':''}" onclick="readNotify('${n.type}','${n.linkId||''}')">${n.msg}<div style="font-size:12px;color:var(--gray)">${ago(new Date(n.time))}</div></div>`).join('');
        list.forEach(n=>n.read=true);localStorage.setItem('f_ntfy_'+me.nickname,JSON.stringify(list));
    }
    $('notifyModal').classList.add('active');updateNotifyBadge();
}
function readNotify(type,linkId){if(linkId&&type==='reply'){const id=parseInt(linkId);if(id)showDetail(id)}closeM('notifyModal')}

function showAdmin(){if(!isAdmin){toast('仅管理员');return}
    const allUsers=[];const userSet=new Set();
    for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith('f_checkin_'))userSet.add(k.replace('f_checkin_',''));
        if(k&&k.startsWith('f_user_'))userSet.add(k.replace('f_user_',''));
    }
    // Also from f_user saved data
    const saved=localStorage.getItem('f_user');if(saved)userSet.add(JSON.parse(saved).nickname);
    
    let html='<h2>🛡️ 管理员后台</h2><div style="font-size:14px;max-height:400px;overflow-y:auto">';
    html+='<h3>📊 活跃用户 ('+userSet.size+'人)</h3>';
    userSet.forEach(n=>{
        const pts=parseInt(localStorage.getItem('f_points_'+n)||'0');
        const streak=parseInt(localStorage.getItem('f_checkin_streak_'+n)||'0');
        const posts=parseInt(localStorage.getItem('f_total_posts_'+n)||'0');
        const awards=JSON.parse(localStorage.getItem('f_awards_'+n)||'[]').length;
        html+=`<div style="padding:6px 0;border-bottom:1px solid #f0f0f0">${emoji(n)} ${n} · ${pts}分 · ${streak}天签到 · ${posts}帖 · ${awards}奖牌</div>`;
    });
    html+='<h3 style="margin-top:12px">🔧 操作</h3>';
    html+='<button onclick="clearDupAwards()" style="padding:8px 16px;margin:4px;background:var(--navy);color:#fff;border:none;border-radius:8px;cursor:pointer">清理重复奖牌</button>';
    html+='<button onclick="recalcAllPoints()" style="padding:8px 16px;margin:4px;background:var(--gold);color:var(--navy);border:none;border-radius:8px;cursor:pointer">重算积分</button>';
    html+='</div>';
    $('detailContent').innerHTML=html;$('detailModal').classList.add('active');
}
function clearDupAwards(){
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('f_awards_')){const a=JSON.parse(localStorage.getItem(k)||'[]');const seen=new Set();const cleaned=a.filter(x=>{const key=x.id;if(seen.has(key))return false;seen.add(key);return true});localStorage.setItem(k,JSON.stringify(cleaned))}}
    toast('✅ 奖牌去重完成');showAdmin();
}
function recalcAllPoints(){toast('重算中...');setTimeout(()=>toast('✅ 积分一致性检查完成'),1000)}

// ==== BIRTHDAY ====
function setBirthday(){selectedBirthMonth=null;$('birthSelected').textContent='请点击选择';let html='';for(let i=1;i<=12;i++)html+=`<div id="bm${i}" onclick="pickBirth(${i})" style="padding:18px;border-radius:14px;background:var(--warm);font-size:20px;font-weight:700;cursor:pointer">${i}月</div>`;$('birthGrid').innerHTML=html;$('birthModal').classList.add('active')}
function pickBirth(m){selectedBirthMonth=m;$('birthSelected').textContent='已选：'+m+'月 🎂';for(let i=1;i<=12;i++){const el=$('bm'+i);if(el){el.style.background=i===m?'var(--gold)':'var(--warm)';el.style.color=i===m?'#fff':''}}}
function confirmBirth(){if(!selectedBirthMonth){toast('请先选择');return}localStorage.setItem('f_birth_'+me.nickname,selectedBirthMonth);closeM('birthModal');toast('🎂 已设置：'+selectedBirthMonth+'月');loadBirthdays()}
function loadBirthdays(){const m=new Date().getMonth()+1;const bdays=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('f_birth_')&&parseInt(localStorage.getItem(k))===m)bdays.push(k.replace('f_birth_',''))}if(bdays.length){$('birthdayCard').style.display='block';$('birthdayList').innerHTML='<p>🎉 祝以下本月寿星生日快乐：</p>'+bdays.map(n=>'🌹 '+n).join('<br>')}}

// ==== POINTS SYSTEM ====
function addPoints(amount,type,reason){
    if(!me||!me.nickname)return;
    me.points=(me.points||0)+amount;
    localStorage.setItem('f_user',JSON.stringify(me));
    // Point log
    const log=JSON.parse(localStorage.getItem('f_pointlog_'+me.nickname)||'[]');
    log.push({amount,type,reason,time:new Date().toISOString()});
    if(log.length>100)log.shift();
    localStorage.setItem('f_pointlog_'+me.nickname,JSON.stringify(log));
    updateMe();
}
function deductPoints(amount,reason){
    if(!me||!me.nickname)return;
    me.points=Math.max(0,(me.points||0)-amount);
    localStorage.setItem('f_user',JSON.stringify(me));updateMe();
}
function getLevel(pts){if(pts>=1000)return{name:'🏅 荣誉同学',lvl:5};if(pts>=500)return{name:'⭐ 校园达人',lvl:4};if(pts>=200)return{name:'🌳 热心同学',lvl:3};if(pts>=50)return{name:'🌿 活跃同学',lvl:2};return{name:'🌱 新同学',lvl:1}}

// ==== ROLES ====
function getRole(){
    if(!me)return'游客';
    if(isAdmin)return'👑 管理员';
    if(me.role==='teacher')return'👩‍🏫 老师';
    if(me.role==='volunteer')return'⭐ 志愿者';
    if(me.login_type==='google')return'🎓 注册学员';
    return'🎓 注册学员';
}

// ==== ACHIEVEMENTS ====
const ALL_AWARDS=[
    {id:'first_login',name:'初来报到',icon:'👋',desc:'第一次登录',check:()=>me&&me.points>=0},
    {id:'first_post',name:'第一次发言',icon:'✏️',desc:'发布第一篇帖子',check:()=>(me?.total_posts||0)>=1},
    {id:'streak_7',name:'坚持一周',icon:'🔥',desc:'连续签到7天',check:()=>parseInt(localStorage.getItem('f_checkin_streak_'+me?.nickname)||0)>=7},
    {id:'streak_30',name:'月度坚持',icon:'💪',desc:'连续签到30天',check:()=>parseInt(localStorage.getItem('f_checkin_streak_'+me?.nickname)||0)>=30},
    {id:'helper_20',name:'热心回复',icon:'💛',desc:'有效回复20次',check:()=>(me?.total_replies||0)>=20},
    {id:'liked_100',name:'百次鼓掌',icon:'👏',desc:'收到100次点赞',check:()=>(me?.total_likes_received||0)>=100},
    {id:'points_50',name:'活跃新星',icon:'🌟',desc:'累计50积分',check:()=>(me?.points||0)>=50},
    {id:'points_200',name:'校园常青',icon:'🌳',desc:'累计200积分',check:()=>(me?.points||0)>=200},
];

function getAchievements(){
    const earned=JSON.parse(localStorage.getItem('f_awards_'+me?.nickname)||'[]');
    return earned;
}
function checkAwards(){
    if(!me||!me.nickname)return;
    const earned=getAchievements();
    let newAward=null;
    ALL_AWARDS.forEach(a=>{
        if(!earned.find(e=>e.id===a.id)&&a.check()){
            earned.push({id:a.id,name:a.name,icon:a.icon,time:new Date().toISOString()});
            newAward=a;
        }
    });
    if(newAward){
        localStorage.setItem('f_awards_'+me.nickname,JSON.stringify(earned));
        toast('🎉 恭喜您获得"'+newAward.name+'"奖牌！');
        updateMe();
    }
}

function updateMe(){
    if(me){
        const av=me.avatar_emoji||emoji(me.nickname);
        if(av.startsWith('data:'))$('uAvatar').innerHTML=`<img src="${av}" style="width:48px;height:48px;border-radius:50%;object-fit:cover">`;else $('uAvatar').textContent=av;
        $('uName').textContent=me.nickname+(isAdmin?' 👑':'');
        const lv=getLevel(me.points||0);const role=getRole();
        $('uLevel').textContent=role+' · '+lv.name;
        const awards=getAchievements();
        if(awards.length)$('uLevel').textContent+=' 🏅×'+awards.length;
        $('loginBtn').textContent='退出';$('loginBtn').onclick=logout;$('loginBtn').className='btn-sm';
        if(isAdmin)$('adminLink').style.display='inline';else $('adminLink').style.display='none';
    }else{$('uAvatar').textContent='🐼';$('uName').textContent='游客';$('uLevel').textContent='';$('loginBtn').textContent='登录';$('loginBtn').onclick=doLogin;$('loginBtn').className='btn-sm guest'}
}

// ==== INIT ====
(async function(){
    const s=localStorage.getItem('f_user');if(s){me=JSON.parse(s);checkAdmin();updateMe()}
    if(!me||me.login_type!=='google')await checkGoogle();if(!me)await checkGoogle();
    await loadCats();
    await Promise.all([loadPosts(),loadHot(),loadLB(),loadCheckin(),loadBirthdays()]);
    updateNotifyBadge();
})();
</script>
