<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园交友 — 阿德莱德老年大学</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --navy: #0A1628; --blue: #1B3A5C; --gold: #C4A44A;
            --white: #FFFFFF; --light: #F5F6F8; --gray: #6B7280;
            --text: #1F2937; --border: #E5E7EB;
            --green: #07C160; --red: #E74C3C;
            --radius: 10px; --size: 16px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
            color: var(--text); line-height: 1.7; background: var(--light);
            -webkit-font-smoothing: antialiased; font-size: var(--size);
        }
        .container{max-width:800px;margin:0 auto;padding:0 16px}

        /* Header */
        .forum-header{
            background: linear-gradient(160deg, #0A1628 0%, #1B3A5C 100%);
            color:#fff; padding: 20px 0 16px; text-align:center; position:sticky; top:0; z-index:100;
        }
        .forum-header h1{font-size:26px;font-weight:900}
        .forum-header h1 span{color:var(--gold)}
        .forum-header .sub{font-size:13px;color:rgba(255,255,255,0.6)}

        /* User Bar */
        .user-bar{
            background:#fff; padding:10px 16px; display:flex; align-items:center; gap:10px;
            font-size:14px; border-bottom:1px solid var(--border); position:sticky; top:88px; z-index:99;
        }
        .user-bar .avatar{font-size:28px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--light);border-radius:50%}
        .user-bar .user-info{flex:1}
        .user-bar .user-name{font-weight:700;color:var(--navy)}
        .user-bar .user-badges{font-size:12px;color:var(--gray)}
        .user-bar .login-btn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
        .user-bar .login-btn.wechat{background:var(--green)}
        .user-bar .logout-btn{font-size:12px;color:var(--gray);background:none;border:none;cursor:pointer}

        /* Category Tabs */
        .cat-tabs{
            display:flex;gap:6px;padding:12px 0;overflow-x:auto;scrollbar-width:none;
            position:sticky; top:136px; background:var(--light); z-index:98;
        }
        .cat-tabs::-webkit-scrollbar{display:none}
        .cat-tab{
            padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;
            white-space:nowrap;cursor:pointer;transition:all 0.2s;
            background:#fff;color:var(--gray);border:1px solid var(--border);
        }
        .cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
        .cat-tab .count{font-size:11px;opacity:0.7;margin-left:4px}

        /* Post Card */
        .post-list{padding:8px 0 80px}
        .post-card{
            background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:10px;
            border:1px solid var(--border);transition:all 0.2s;cursor:pointer
        }
        .post-card:hover{border-color:var(--gold);box-shadow:0 2px 12px rgba(0,0,0,0.05)}
        .post-card .post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .post-card .post-avatar{font-size:24px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--light);border-radius:50%;flex-shrink:0}
        .post-card .post-meta{flex:1;min-width:0}
        .post-card .post-author{font-size:13px;font-weight:600;color:var(--navy)}
        .post-card .post-time{font-size:11px;color:var(--gray)}
        .post-card .post-cat{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--light);color:var(--gray);flex-shrink:0}
        .post-card h3{font-size:17px;color:var(--navy);margin-bottom:6px;line-height:1.4}
        .post-card .post-preview{font-size:14px;color:#666;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .post-card .post-image{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-top:8px}
        .post-card .post-footer{display:flex;gap:16px;margin-top:10px;font-size:13px;color:var(--gray)}
        .post-card .post-footer span{display:flex;align-items:center;gap:4px}
        .post-card .liked{color:var(--red)}

        /* New Post Button */
        .fab{
            position:fixed;bottom:24px;right:24px;width:56px;height:56px;
            background:var(--gold);color:var(--navy);border:none;border-radius:50%;
            font-size:28px;box-shadow:0 4px 20px rgba(0,0,0,0.2);cursor:pointer;
            z-index:200;transition:all 0.3s;display:flex;align-items:center;justify-content:center
        }
        .fab:hover{transform:scale(1.1);background:#d4b85a}

        /* Modal */
        .modal-overlay{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);
            z-index:9999;align-items:flex-end;justify-content:center
        }
        .modal-overlay.active{display:flex}
        .modal{
            background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:800px;
            max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp 0.3s ease
        }
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-close{float:right;font-size:24px;cursor:pointer;color:var(--gray);background:none;border:none}
        .modal h2{font-size:20px;color:var(--navy);margin-bottom:16px}
        .modal textarea,.modal input,.modal select{
            width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;
            font-size:15px;font-family:inherit;margin-bottom:12px;resize:vertical
        }
        .modal textarea:focus,.modal input:focus,.modal select:focus{outline:none;border-color:var(--navy)}
        .modal button[type=submit]{
            width:100%;padding:14px;background:var(--navy);color:#fff;border:none;
            border-radius:8px;font-size:16px;font-weight:700;cursor:pointer
        }

        /* Achievements */
        .achievement-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
        .ach-badge{text-align:center;padding:8px 4px;border-radius:8px;font-size:11px;opacity:0.3}
        .ach-badge.unlocked{opacity:1;background:#fff;border:1px solid var(--gold)}
        .ach-badge .ach-icon{font-size:24px;display:block;margin-bottom:2px}
        .ach-badge .ach-name{font-weight:600;color:var(--navy)}

        /* Toast */
        .toast{
            position:fixed;top:20px;left:50%;transform:translateX(-50%);
            background:var(--navy);color:#fff;padding:10px 24px;border-radius:20px;
            font-size:14px;z-index:99999;animation:fadeInOut 2s ease forwards
        }
        @keyframes fadeInOut{0%{opacity:0;top:0}20%{opacity:1;top:20px}80%{opacity:1;top:20px}100%{opacity:0;top:0}}

        @media(max-width:480px){
            .forum-header h1{font-size:22px}
            .post-card h3{font-size:15px}
            .cat-tab{padding:6px 12px;font-size:13px}
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="forum-header">
    <h1>🏫 <span>校园交友</span></h1>
    <p class="sub">阿德莱德老年大学社区论坛 · 连接·分享·互助·交友</p>
</div>

<!-- User Bar -->
<div class="user-bar" id="userBar">
    <div class="avatar" id="userAvatar">🐼</div>
    <div class="user-info">
        <div class="user-name" id="userName">游客</div>
        <div class="user-badges" id="userBadges">登录解锁成就和积分</div>
    </div>
    <button class="login-btn" id="loginBtn" onclick="showLogin()">注册 / 登录</button>
</div>

<!-- Category Tabs -->
<div class="cat-tabs" id="catTabs">
    <div class="cat-tab active" data-cat="all" onclick="switchCategory('all')">全部</div>
</div>

<!-- Post List -->
<div class="container">
    <div class="post-list" id="postList">
        <p style="text-align:center;color:var(--gray);padding:40px">加载中...</p>
    </div>
</div>

<!-- FAB -->
<button class="fab" onclick="showNewPost()" title="发布新话题">✏️</button>

<!-- New Post Modal -->
<div class="modal-overlay" id="newPostModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('newPostModal')">✕</button>
        <h2>✏️ 发布新话题</h2>
        <form onsubmit="submitPost(event)">
            <select id="postCategory" required>
                <option value="">选择版块</option>
            </select>
            <input type="text" id="postTitle" placeholder="标题（必填）" required maxlength="100">
            <textarea id="postContent" rows="5" placeholder="说点什么吧..." required maxlength="5000"></textarea>
            <p style="font-size:12px;color:var(--gray);margin-bottom:12px">
                当前身份：<strong id="postAsName">游客</strong>
            </p>
            <button type="submit">发布帖子</button>
        </form>
    </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal">
    <div class="modal" style="text-align:center">
        <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
        <h2>👋 加入校园交友</h2>
        <p style="color:var(--gray);margin-bottom:20px">选择一种方式登录，解锁成就和积分</p>
        
        <div style="background:var(--light);border-radius:12px;padding:20px;margin-bottom:12px">
            <p style="font-size:14px;color:var(--gray)">不想注册？输入昵称直接发帖</p>
            <input type="text" id="guestNickname" placeholder="输入你的昵称" maxlength="20" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;text-align:center;margin-top:8px">
            <button class="login-btn" style="width:100%;margin-top:8px;font-size:15px;padding:12px" onclick="loginAsGuest()">以游客身份进入</button>
        </div>

        <div style="background:rgba(7,193,96,0.05);border:1px solid var(--green);border-radius:12px;padding:20px;margin-bottom:12px">
            <p style="font-weight:700;color:var(--green);font-size:16px">💚 微信扫码登录</p>
            <p style="font-size:13px;color:var(--gray);margin:8px 0">推荐方式 · 自动同步成就</p>
            <div style="width:160px;height:160px;background:var(--light);margin:12px auto;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gray)">
                微信登录<br>开发中
            </div>
        </div>

        <div style="background:var(--light);border-radius:12px;padding:20px">
            <p style="font-weight:700;color:var(--navy);font-size:14px">📱 手机号注册</p>
            <p style="font-size:13px;color:var(--gray);margin:8px 0">没有微信也能注册</p>
            <input type="tel" id="phoneNumber" placeholder="输入手机号" style="width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;text-align:center;margin-bottom:8px">
            <button class="login-btn" style="width:100%;font-size:15px;padding:12px" onclick="loginByPhone()">发送验证码</button>
        </div>
    </div>
</div>

<!-- Achievement Modal -->
<div class="modal-overlay" id="achModal">
    <div class="modal">
        <button class="modal-close" onclick="closeModal('achModal')">✕</button>
        <h2>🏆 我的成就</h2>
        <div class="achievement-grid" id="achGrid"></div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal" id="detailContent"></div>
</div>

<!-- Toast Container -->
<div id="toast"></div>

<script>
// ============ SUPABASE CONFIG ============
// TODO: Replace with your Supabase project URL and anon key
const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
const SUPABASE_KEY = 'YOUR-ANON-KEY';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
// ========================================

// ============ STATE ============
let currentUser = null; // { id, nickname, login_type, avatar_emoji, ... }
let currentCategory = 'all';
let categories = [];
let posts = [];
let achievements = [];
let userAchievements = [];

// ============ INIT ============
async function init() {
    // Check for saved guest session
    const saved = localStorage.getItem('acsc_user');
    if (saved) {
        currentUser = JSON.parse(saved);
        updateUserBar();
        loadAchievements();
    }
    
    // Load categories
    await loadCategories();
    
    // Load posts
    await loadPosts();
}

// ============ CATEGORIES ============
async function loadCategories() {
    try {
        const { data } = await supabase.from('categories').select('*').order('sort_order');
        categories = data || [];
        renderCatTabs();
        
        // Also populate new post dropdown
        const sel = document.getElementById('postCategory');
        sel.innerHTML = '<option value="">选择版块</option>' + 
            categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    } catch(e) {
        console.log('DB not connected yet - using defaults');
        categories = [
            {id:1,name:'活动报名',slug:'events',icon:'📢'},
            {id:2,name:'生活互助',slug:'life-help',icon:'🏠'},
            {id:3,name:'健康养生',slug:'health',icon:'🩺'},
            {id:4,name:'儿孙天地',slug:'family',icon:'👨‍👩‍👧‍👦'},
            {id:5,name:'才艺晒晒',slug:'talent',icon:'🎨'},
            {id:6,name:'二手转让',slug:'market',icon:'🛒'},
        ];
        renderCatTabs();
        const sel = document.getElementById('postCategory');
        sel.innerHTML = '<option value="">选择版块</option>' + 
            categories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    }
}

function renderCatTabs() {
    const tabs = document.getElementById('catTabs');
    tabs.innerHTML = `
        <div class="cat-tab ${currentCategory==='all'?'active':''}" data-cat="all" onclick="switchCategory('all')">全部</div>
        ${categories.map(c => `
            <div class="cat-tab ${currentCategory==String(c.id)?'active':''}" data-cat="${c.id}" onclick="switchCategory('${c.id}')">
                ${c.icon} ${c.name}
            </div>
        `).join('')}
    `;
}

function switchCategory(cat) {
    currentCategory = cat;
    renderCatTabs();
    loadPosts();
}

// ============ POSTS ============
async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<p style="text-align:center;color:var(--gray);padding:40px">加载中...</p>';
    
    try {
        let query = supabase.from('posts').select('*, categories(*)').order('created_at', { ascending: false }).limit(50);
        if (currentCategory !== 'all') {
            query = query.eq('category_id', parseInt(currentCategory));
        }
        const { data } = await query;
        posts = data || [];
        
        if (posts.length === 0) {
            list.innerHTML = `
                <div style="text-align:center;padding:60px 20px;color:var(--gray)">
                    <div style="font-size:48px;margin-bottom:12px">📝</div>
                    <p style="font-size:16px;margin-bottom:8px">还没有帖子</p>
                    <p>点击右下角 ✏️ 按钮发布第一条话题吧！</p>
                </div>`;
            return;
        }
        
        list.innerHTML = posts.map(p => {
            const cat = categories.find(c => c.id === p.category_id) || {name:'综合',icon:'💬'};
            const time = timeAgo(p.created_at);
            const author = p.guest_nickname || (p.users?.nickname) || '匿名';
            const avatar = p.users?.avatar_emoji || randomAvatar(p.guest_nickname || '');
            return `
                <div class="post-card" onclick="showDetail(${p.id})">
                    <div class="post-header">
                        <div class="post-avatar">${avatar}</div>
                        <div class="post-meta">
                            <div class="post-author">${author} ${p.users?.login_type==='guest'?'<small style="color:var(--gray)">游客</small>':''}</div>
                            <div class="post-time">${time}</div>
                        </div>
                        <div class="post-cat">${cat.icon} ${cat.name}</div>
                    </div>
                    <h3>${p.is_pinned ? '📌 ' : ''}${escapeHtml(p.title)}</h3>
                    <div class="post-preview">${escapeHtml(p.content)}</div>
                    ${p.image_url ? `<img src="${p.image_url}" class="post-image" loading="lazy">` : ''}
                    <div class="post-footer">
                        <span onclick="event.stopPropagation();likePost(${p.id})">${p.likes > 0 ? '❤️' : '🤍'} ${p.likes}</span>
                        <span>💬 ${p.reply_count || 0} 回复</span>
                    </div>
                </div>`;
        }).join('');
    } catch(e) {
        console.log('Error loading posts:', e.message);
        list.innerHTML = `
            <div style="text-align:center;padding:60px 20px;color:var(--gray)">
                <div style="font-size:48px;margin-bottom:12px">🔌</div>
                <p style="margin-bottom:8px">正在连接服务器...</p>
                <p style="font-size:13px">数据库配置完成后即可使用</p>
            </div>`;
    }
}

// ============ NEW POST ============
function showNewPost() {
    if (!currentUser || currentUser.login_type === 'guest' && !currentUser.nickname) {
        showLogin();
        return;
    }
    document.getElementById('postAsName').textContent = currentUser.nickname || '游客';
    document.getElementById('newPostModal').classList.add('active');
}

async function submitPost(e) {
    e.preventDefault();
    const catId = document.getElementById('postCategory').value;
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('postContent').value.trim();
    
    if (!catId || !title || !content) return;
    
    const postData = {
        category_id: parseInt(catId),
        title: title,
        content: content,
    };
    
    if (currentUser && currentUser.id) {
        postData.user_id = currentUser.id;
    } else {
        postData.guest_nickname = currentUser?.nickname || '游客';
    }
    
    try {
        const { error } = await supabase.from('posts').insert(postData);
        if (error) throw error;
        
        document.getElementById('newPostModal').classList.remove('active');
        document.getElementById('postTitle').value = '';
        document.getElementById('postContent').value = '';
        toast('✅ 发布成功！');
        loadPosts();
        
        // Check achievements
        if (currentUser?.id) await checkAchievements();
    } catch(e) {
        toast('❌ 发布失败：' + e.message);
    }
}

// ============ LIKE ============
async function likePost(postId) {
    if (!currentUser?.id) {
        toast('请先登录才能点赞');
        return;
    }
    try {
        const { data: existing } = await supabase.from('post_likes').select().eq('post_id',postId).eq('user_id',currentUser.id).single();
        if (existing) {
            await supabase.from('post_likes').delete().eq('post_id',postId).eq('user_id',currentUser.id);
            await supabase.rpc('decrement_likes', { post_id: postId });
        } else {
            await supabase.from('post_likes').insert({post_id:postId, user_id:currentUser.id});
            await supabase.rpc('increment_likes', { post_id: postId });
        }
        loadPosts();
    } catch(e) {
        toast('操作失败');
    }
}

// ============ DETAIL ============
async function showDetail(postId) {
    const post = posts.find(p => p.id === postId);
    if (!post) return;
    
    const cat = categories.find(c => c.id === post.category_id) || {name:'综合',icon:'💬'};
    const author = post.guest_nickname || (post.users?.nickname) || '匿名';
    const avatar = post.users?.avatar_emoji || randomAvatar(author);
    
    // Load replies
    let repliesHtml = '<p style="color:var(--gray)">暂无回复</p>';
    try {
        const { data: replies } = await supabase.from('replies').select('*').eq('post_id', postId).order('created_at');
        if (replies && replies.length > 0) {
            repliesHtml = replies.map(r => `
                <div style="padding:12px 0;border-bottom:1px solid var(--border)">
                    <div style="font-weight:600;font-size:13px;margin-bottom:4px">${r.guest_nickname || '匿名'} · ${timeAgo(r.created_at)}</div>
                    <div style="font-size:14px;line-height:1.6">${escapeHtml(r.content)}</div>
                </div>
            `).join('');
        }
    } catch(e) {}
    
    document.getElementById('detailContent').innerHTML = `
        <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
        <div class="post-header" style="margin-bottom:16px">
            <div class="post-avatar">${avatar}</div>
            <div>
                <div class="post-author">${author}</div>
                <div class="post-time">${timeAgo(post.created_at)} · ${cat.icon} ${cat.name}</div>
            </div>
        </div>
        <h2 style="font-size:20px;margin-bottom:12px">${escapeHtml(post.title)}</h2>
        <div style="font-size:15px;line-height:1.8;margin-bottom:20px;white-space:pre-wrap">${escapeHtml(post.content)}</div>
        ${post.image_url ? `<img src="${post.image_url}" style="width:100%;max-height:400px;object-fit:cover;border-radius:8px;margin-bottom:20px">` : ''}
        <div style="display:flex;gap:16px;margin-bottom:24px;font-size:14px">
            <span onclick="likePost(${post.id})" style="cursor:pointer">${post.likes > 0 ? '❤️' : '🤍'} ${post.likes} 赞</span>
            <span>💬 ${post.reply_count || 0} 回复</span>
        </div>
        
        <h3 style="font-size:16px;margin-bottom:12px">回复</h3>
        ${repliesHtml}
        
        <div style="margin-top:16px;display:flex;gap:8px">
            <input type="text" id="replyInput" placeholder="写回复..." style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px">
            <button onclick="submitReply(${postId})" style="padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer">回复</button>
        </div>
    `;
    document.getElementById('detailModal').classList.add('active');
}

async function submitReply(postId) {
    const input = document.getElementById('replyInput');
    const content = input.value.trim();
    if (!content) return;
    
    const reply = { post_id: postId, content };
    if (currentUser?.id) {
        reply.user_id = currentUser.id;
    } else {
        reply.guest_nickname = currentUser?.nickname || '游客';
    }
    
    try {
        await supabase.from('replies').insert(reply);
        input.value = '';
        toast('✅ 回复成功');
        showDetail(postId);
        loadPosts();
        if (currentUser?.id) await checkAchievements();
    } catch(e) {
        toast('回复失败');
    }
}

// ============ LOGIN ============
function showLogin() {
    document.getElementById('loginModal').classList.add('active');
}

function loginAsGuest() {
    const name = document.getElementById('guestNickname').value.trim();
    if (!name) { toast('请输入昵称'); return; }
    
    currentUser = {
        id: null,
        nickname: name,
        login_type: 'guest',
        avatar_emoji: randomAvatar(name)
    };
    
    localStorage.setItem('acsc_user', JSON.stringify(currentUser));
    updateUserBar();
    closeModal('loginModal');
    toast(`👋 欢迎，${name}！`);
}

async function loginByPhone() {
    const phone = document.getElementById('phoneNumber').value.trim();
    if (!phone) { toast('请输入手机号'); return; }
    toast('📱 验证码已发送（演示模式，直接登录）');
    
    // Simulate phone login
    const { data } = await supabase.from('users').upsert({
        phone: phone,
        nickname: '用户' + phone.slice(-4),
        login_type: 'phone',
        avatar_emoji: randomAvatar(phone),
        last_login: new Date().toISOString()
    }, { onConflict: 'phone' }).select().single();
    
    if (data) {
        currentUser = data;
        localStorage.setItem('acsc_user', JSON.stringify(currentUser));
        updateUserBar();
        closeModal('loginModal');
        toast('✅ 登录成功！');
        loadAchievements();
    }
}

// ============ ACHIEVEMENTS ============
async function loadAchievements() {
    if (!currentUser?.id) return;
    try {
        const { data: allAch } = await supabase.from('achievements').select('*');
        const { data: userAch } = await supabase.from('user_achievements').select('*').eq('user_id', currentUser.id);
        achievements = allAch || [];
        userAchievements = (userAch || []).map(a => a.achievement_id);
        
        // Update badge count
        document.getElementById('userBadges').textContent = 
            userAchievements.length > 0 ? `🏅 ${userAchievements.length} 个成就` : '登录解锁成就和积分';
    } catch(e) {}
}

async function checkAchievements() {
    if (!currentUser?.id) return;
    // This would check all conditions and unlock new ones
    // Simplified version - just reload
    await loadAchievements();
}

function showAchievements() {
    if (!currentUser?.id) { showLogin(); return; }
    
    const grid = document.getElementById('achGrid');
    grid.innerHTML = achievements.map(a => {
        const unlocked = userAchievements.includes(a.id);
        return `
            <div class="ach-badge ${unlocked ? 'unlocked' : ''}">
                <span class="ach-icon">${unlocked ? a.icon : '🔒'}</span>
                <span class="ach-name">${a.name}</span>
            </div>`;
    }).join('');
    document.getElementById('achModal').classList.add('active');
}

// ============ UTILS ============
function updateUserBar() {
    if (currentUser) {
        document.getElementById('userAvatar').textContent = currentUser.avatar_emoji || '🐼';
        document.getElementById('userName').textContent = currentUser.nickname;
        document.getElementById('loginBtn').textContent = '退出';
        document.getElementById('loginBtn').onclick = logout;
        document.getElementById('userName').style.cursor = 'pointer';
        document.getElementById('userName').onclick = showAchievements;
    } else {
        document.getElementById('userAvatar').textContent = '🐼';
        document.getElementById('userName').textContent = '游客';
        document.getElementById('loginBtn').textContent = '注册 / 登录';
        document.getElementById('loginBtn').onclick = showLogin;
        document.getElementById('userBadges').textContent = '登录解锁成就和积分';
    }
}

function logout() {
    currentUser = null;
    localStorage.removeItem('acsc_user');
    userAchievements = [];
    updateUserBar();
    toast('已退出');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'fadeInOut 2s ease forwards';
}

function timeAgo(dateStr) {
    const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff/60) + '分钟前';
    if (diff < 86400) return Math.floor(diff/3600) + '小时前';
    if (diff < 604800) return Math.floor(diff/86400) + '天前';
    return new Date(dateStr).toLocaleDateString('zh-CN');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function randomAvatar(seed) {
    const avatars = ['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸','🐵','🐔','🦄','🐙','🦋','🐬','🦉','🐝'];
    let hash = 0;
    for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    return avatars[Math.abs(hash) % avatars.length];
}
