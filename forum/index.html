<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园交友 — 阿德莱德老年大学</title>
    <style>
        :root {--navy:#0A1628;--blue:#1B3A5C;--gold:#C4A44A;--white:#FFF;--light:#F5F6F8;--gray:#6B7280;--text:#1F2937;--border:#E5E7EB;--green:#07C160;--radius:10px}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.7;background:var(--light);font-size:16px}
        .container{max-width:800px;margin:0 auto;padding:0 16px}
        .forum-header{background:linear-gradient(160deg,#0A1628,#1B3A5C);color:#fff;padding:20px 0 16px;text-align:center;position:sticky;top:0;z-index:100}
        .forum-header h1{font-size:26px;font-weight:900}
        .forum-header h1 span{color:var(--gold)}
        .forum-header .sub{font-size:13px;color:rgba(255,255,255,0.6)}
        .user-bar{background:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:14px;border-bottom:1px solid var(--border)}
        .user-bar .avatar{font-size:28px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--light);border-radius:50%}
        .user-bar .user-info{flex:1}.user-bar .user-name{font-weight:700;color:var(--navy)}
        .user-bar .login-btn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
        .cat-tabs{display:flex;gap:6px;padding:12px 0;overflow-x:auto;scrollbar-width:none;position:sticky;top:88px;background:var(--light);z-index:98}
        .cat-tabs::-webkit-scrollbar{display:none}
        .cat-tab{padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;white-space:nowrap;cursor:pointer;background:#fff;color:var(--gray);border:1px solid var(--border)}
        .cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
        .post-list{padding:8px 0 80px}
        .post-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer}
        .post-card:hover{border-color:var(--gold)}
        .post-card .post-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
        .post-card .post-avatar{font-size:24px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--light);border-radius:50%}
        .post-card .post-meta{flex:1}.post-card .post-author{font-size:13px;font-weight:600;color:var(--navy)}
        .post-card .post-time{font-size:11px;color:var(--gray)}
        .post-card .post-cat{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--light);color:var(--gray)}
        .post-card h3{font-size:17px;color:var(--navy);margin-bottom:6px}
        .post-card .post-preview{font-size:14px;color:#666;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;background:var(--gold);color:var(--navy);border:none;border-radius:50%;font-size:28px;cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:flex-end;justify-content:center}
        .modal-overlay.active{display:flex}
        .modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp 0.3s}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        .modal-close{float:right;font-size:24px;cursor:pointer;color:var(--gray);background:none;border:none}
        .modal h2{font-size:20px;color:var(--navy);margin-bottom:16px}
        .modal textarea,.modal input,.modal select{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;margin-bottom:12px}
        .modal textarea:focus,.modal input:focus,.modal select:focus{outline:none;border-color:var(--navy)}
        .modal button[type=submit]{width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:99999;animation:fadeInOut 2s ease forwards}
        @keyframes fadeInOut{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}
        @media(max-width:480px){.forum-header h1{font-size:22px}.post-card h3{font-size:15px}.cat-tab{padding:6px 12px;font-size:13px}}
    </style>
</head>
<body>

<div class="forum-header"><h1>🏫 <span>校园交友</span></h1><p class="sub">阿德莱德老年大学社区论坛 · 连接·分享·互助·交友</p></div>

<div class="user-bar" id="userBar">
    <div class="avatar" id="userAvatar">🐼</div>
    <div class="user-info"><div class="user-name" id="userName">游客</div></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">输入昵称</button>
</div>

<div class="cat-tabs" id="catTabs"></div>

<div class="container">
    <div class="post-list" id="postList"><p style="text-align:center;color:var(--gray);padding:40px">加载中...</p></div>
    <p id="debug" style="text-align:center;font-size:11px;color:#ccc;margin-top:-16px"></p>
</div>

<button class="fab" onclick="showNewPost()">✏️</button>

<div class="modal-overlay" id="newPostModal"><div class="modal">
    <button class="modal-close" onclick="closeModal('newPostModal')">✕</button>
    <h2>✏️ 发布新话题</h2>
    <form onsubmit="submitPost(event)"><select id="postCategory" required><option value="">选择版块</option></select>
    <input id="postTitle" placeholder="标题" required maxlength="100">
    <textarea id="postContent" rows="4" placeholder="说点什么吧..." required></textarea>
    <p style="font-size:12px;color:var(--gray);margin-bottom:12px">身份：<strong id="postAs">游客</strong></p>
    <button type="submit">发布帖子</button></form>
</div></div>

<div class="modal-overlay" id="detailModal"><div class="modal" id="detailContent"></div></div>

<div class="modal-overlay" id="loginModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeModal('loginModal')">✕</button>
    <h2>👋 输入昵称</h2>
    <p style="color:var(--gray);margin-bottom:16px">取一个名字就能发帖啦</p>
    <input id="guestNickname" placeholder="你的昵称" maxlength="20" style="text-align:center;font-size:18px">
    <button onclick="loginAsGuest()" style="width:100%;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px">进入论坛</button>
</div></div>

<div id="toast"></div>

<script>
const API = 'https://nkvavgmvbmzrnwurazgq.supabase.co/rest/v1';
const KEY = 'sb_publishable_fOyq5agLNbcFEJ-LrpYa_w_C6rjQGxZ';
const H = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};

let me = null, cat = 'all', cats = [], posts = [];

function D(m){const e=document.getElementById('debug');if(e)e.textContent='🔍 '+m;console.log(m)}
function $(id){return document.getElementById(id)}

async function api(path, opt={}){
    const r = await fetch(API+path, {headers:H, ...opt});
    if(!r.ok) throw new Error(r.status+' '+await r.text());
    return r.json();
}

// Init
(async function(){
    D('启动中...');
    const s = localStorage.getItem('forum_user');
    if(s){me=JSON.parse(s);updateBar()}
    try{ cats = await api('/categories?order=sort_order'); D('分类:'+cats.length); }
    catch(e){ cats=[{id:1,name:'活动报名',icon:'📢'},{id:2,name:'生活互助',icon:'🏠'},{id:3,name:'健康养生',icon:'🩺'},{id:4,name:'儿孙天地',icon:'👨‍👩‍👧‍👦'},{id:5,name:'才艺晒晒',icon:'🎨'},{id:6,name:'二手转让',icon:'🛒'}]; D('离线模式'); }
    renderTabs();
    $('postCategory').innerHTML = '<option value="">选择版块</option>'+cats.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
    await loadPosts();
})();

function renderTabs(){
    $('catTabs').innerHTML = `<div class="cat-tab ${cat==='all'?'active':''}" onclick="switchCat('all')">全部</div>`+
        cats.map(c=>`<div class="cat-tab ${cat==String(c.id)?'active':''}" onclick="switchCat('${c.id}')">${c.icon} ${c.name}</div>`).join('');
}
async function switchCat(c){cat=c;renderTabs();await loadPosts()}

async function loadPosts(){
    $('postList').innerHTML='<p style="text-align:center;color:var(--gray);padding:40px">加载中...</p>';
    try{
        let q = '/posts?select=*&order=created_at.desc&limit=50';
        if(cat!=='all') q = `/posts?select=*&category_id=eq.${cat}&order=created_at.desc&limit=50`;
        posts = await api(q);
        D('帖子:'+posts.length);
        if(!posts.length){$('postList').innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:48px">📝</div><p>还没有帖子，点击右下角 ✏️ 发帖吧！</p></div>';return}
        $('postList').innerHTML = posts.map(p=>{
            const c = cats.find(x=>x.id===p.category_id)||{name:'综合',icon:'💬'};
            return `<div class="post-card" onclick="showDetail(${p.id})">
                <div class="post-header"><div class="post-avatar">${emoji(p.guest_nickname||'')}</div>
                <div class="post-meta"><div class="post-author">${p.guest_nickname||'匿名'}</div><div class="post-time">${ago(p.created_at)}</div></div>
                <div class="post-cat">${c.icon} ${c.name}</div></div>
                <h3>${esc(p.title)}</h3><div class="post-preview">${esc(p.content)}</div>
                <div style="margin-top:8px;font-size:13px;color:var(--gray)">💬 ${p.reply_count||0} 回复</div></div>`;
        }).join('');
    }catch(e){D('错误:'+e.message);$('postList').innerHTML='<div style="text-align:center;padding:60px"><p>❌ '+e.message+'</p><p style="margin-top:8px"><a href="javascript:loadPosts()" style="color:var(--navy)">点击重试</a></p></div>'}
}

function showNewPost(){if(!me){doLogin();return}$('postAs').textContent=me.nickname;$('newPostModal').classList.add('active')}
async function submitPost(e){e.preventDefault();
    const d={category_id:parseInt($('postCategory').value),title:$('postTitle').value.trim(),content:$('postContent').value.trim(),guest_nickname:me?.nickname||'游客'};
    try{await api('/posts',{method:'POST',body:JSON.stringify(d),headers:{...H,Prefer:'return=minimal'}});$('newPostModal').classList.remove('active');$('postTitle').value='';$('postContent').value='';toast('✅ 发布成功');loadPosts()}catch(e){toast('❌ '+e.message)}
}

async function showDetail(id){
    const p=posts.find(x=>x.id===id);if(!p)return;
    const c=cats.find(x=>x.id===p.category_id)||{name:'综合',icon:'💬'};
    let rh='<p style="color:var(--gray)">暂无回复</p>';
    try{const r=await api('/replies?post_id=eq.'+id+'&order=created_at');if(r.length)rh=r.map(x=>`<div style="padding:12px 0;border-bottom:1px solid var(--border)"><div style="font-weight:600;font-size:13px">${x.guest_nickname||'匿名'} · ${ago(x.created_at)}</div><div style="font-size:14px">${esc(x.content)}</div></div>`).join('')}catch(e){}
    $('detailContent').innerHTML=`<button class="modal-close" onclick="closeModal('detailModal')">✕</button>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="font-size:28px">${emoji(p.guest_nickname||'')}</div><div><div style="font-weight:600">${p.guest_nickname||'匿名'}</div><div style="font-size:12px;color:var(--gray)">${ago(p.created_at)} · ${c.icon} ${c.name}</div></div></div>
        <h2 style="font-size:20px;margin-bottom:12px">${esc(p.title)}</h2>
        <div style="font-size:15px;line-height:1.8;margin-bottom:20px;white-space:pre-wrap">${esc(p.content)}</div>
        <h3 style="font-size:16px;margin-bottom:12px">回复 (${p.reply_count||0})</h3>${rh}
        <div style="margin-top:16px;display:flex;gap:8px"><input id="replyInput" placeholder="写回复..." style="flex:1;padding:10px;border:1px solid var(--border);border-radius:8px"><button onclick="submitReply(${id})" style="padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-weight:600">回复</button></div>`;
    $('detailModal').classList.add('active');
}
async function submitReply(pid){
    const c=$('replyInput').value.trim();if(!c)return;
    try{await api('/replies',{method:'POST',body:JSON.stringify({post_id:pid,content:c,guest_nickname:me?.nickname||'游客'}),headers:{...H,Prefer:'return=minimal'}});$('replyInput').value='';toast('✅ 回复成功');showDetail(pid);loadPosts()}catch(e){toast('❌ '+e.message)}
}

function doLogin(){$('loginModal').classList.add('active')}
function loginAsGuest(){
    const n=$('guestNickname').value.trim();if(!n){toast('请输入昵称');return}
    me={nickname:n};localStorage.setItem('forum_user',JSON.stringify(me));updateBar();closeModal('loginModal');toast('👋 欢迎，'+n+'！')
}
function updateBar(){
    if(me){$('userAvatar').textContent=emoji(me.nickname);$('userName').textContent=me.nickname;$('loginBtn').textContent='退出';$('loginBtn').onclick=logout}
    else{$('userAvatar').textContent='🐼';$('userName').textContent='游客';$('loginBtn').textContent='输入昵称';$('loginBtn').onclick=doLogin}
}
function logout(){me=null;localStorage.removeItem('forum_user');updateBar();toast('已退出')}
function closeModal(id){$(id).classList.remove('active')}
function toast(m){const e=$('toast');e.textContent=m;e.style.animation='none';e.offsetHeight;e.style.animation='fadeInOut 2s ease forwards'}
function ago(d){const s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';if(s<604800)return Math.floor(s/86400)+'天前';return new Date(d).toLocaleDateString('zh-CN')}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function emoji(s){const a=['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸'];let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return a[Math.abs(h)%a.length]}
</script>
</body>
</html>
