<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>老年大学同学之间</title>
<style>
:root{--bg:#FFF8F0;--card:#FFF;--warm:#E8D5B7;--gold:#C4A44A;--navy:#2C3E50;--green:#6B8E6B;--pink:#E8A0A0;--text:#3D3D3D;--gray:#999;--red:#E74C3C;--radius:16px;--shadow:0 2px 12px rgba(0,0,0,.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);line-height:1.7;background:var(--bg);font-size:18px}
.container{max-width:700px;margin:0 auto;padding:0 14px}
.header{background:linear-gradient(160deg,#5B7B6C,#6B8E6B);color:#fff;padding:16px 14px;text-align:center;position:sticky;top:0;z-index:100;border-radius:0 0 20px 20px}
.header h1{font-size:24px;font-weight:900}.header .sub{font-size:14px;opacity:.9;margin-top:2px}
.header .sub a{color:rgba(255,255,255,.8);text-decoration:none}
.notify-btn{position:absolute;right:16px;top:14px;font-size:26px;cursor:pointer;background:none;border:none;color:#fff}
.notify-badge{position:absolute;top:-6px;right:-6px;min-width:20px;height:20px;background:var(--red);border-radius:10px;font-size:12px;color:#fff;display:none;align-items:center;justify-content:center;padding:0 5px;font-weight:700}
.user-strip{display:flex;align-items:center;gap:10px;padding:12px 0}
.u-avatar{width:48px;height:48px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden;cursor:pointer}
.u-avatar img{width:100%;height:100%;object-fit:cover}
.u-info{flex:1;min-width:0}.u-name{font-weight:700;font-size:17px;color:var(--navy)}.u-meta{font-size:13px;color:var(--gray)}
.u-actions{display:flex;gap:6px;flex-wrap:wrap}.u-action{font-size:12px;padding:4px 10px;border-radius:12px;border:1px solid var(--warm);background:#fff;color:var(--navy);cursor:pointer;text-decoration:none}
.btn-sm{padding:8px 18px;border-radius:20px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:var(--navy);color:#fff}.btn-sm.guest{background:var(--gold)}
.breadcrumb{font-size:13px;color:var(--gray);padding:4px 0;display:none}.breadcrumb a{color:var(--gold);cursor:pointer;text-decoration:none}.breadcrumb span{color:var(--text);font-weight:600}
.online-bar{font-size:13px;color:var(--green);padding:4px 0;display:flex;align-items:center;gap:6px}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.cat-box{background:var(--card);border-radius:var(--radius);padding:14px 8px;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all .2s;text-decoration:none;color:inherit;border:2px solid transparent}
.cat-box:hover{transform:translateY(-2px)}.cat-box.active{border-color:var(--gold)}
.cat-box .c-icon{font-size:28px;display:block;margin-bottom:4px}.cat-box .c-name{font-size:13px;font-weight:700;color:var(--navy)}.cat-box .c-count{font-size:11px;color:var(--gray)}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.sec-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:0;margin-bottom:12px;background:var(--warm);border-radius:25px;padding:3px}
.tab-btn{flex:1;padding:10px 6px;border-radius:22px;border:none;background:transparent;font-size:14px;font-weight:600;cursor:pointer;color:var(--gray);white-space:nowrap}
.tab-btn.active{background:#fff;color:var(--navy);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.checkin-card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);text-align:center}
.mood-picker{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.mood-btn{padding:10px 16px;border-radius:20px;border:2px solid var(--warm);background:#fff;font-size:16px;cursor:pointer}
.post-card{cursor:pointer}.post-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.post-pavatar{width:40px;height:40px;border-radius:50%;background:var(--warm);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.post-pavatar img{width:100%;height:100%;object-fit:cover}
.post-meta{flex:1}.post-author{font-weight:600;color:var(--navy);font-size:15px}.post-time{font-size:13px;color:var(--gray)}
.post-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.post-preview{font-size:15px;color:#666;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:8px}
.post-actions{display:flex;gap:10px;font-size:14px;color:var(--gray);align-items:center;flex-wrap:wrap}
.react-btn{padding:4px 12px;border-radius:12px;border:1px solid var(--warm);background:#fff;cursor:pointer;font-size:15px}.react-btn.liked{background:rgba(231,76,60,.1);border-color:var(--red)}
.post-badges{display:inline-flex;gap:4px}.post-badges span{padding:2px 6px;border-radius:8px;font-size:11px;font-weight:600}
.badge-pin{background:rgba(196,164,74,.15);color:var(--gold)}.badge-star{background:rgba(231,76,60,.1);color:var(--red)}.badge-lock{background:rgba(0,0,0,.06);color:var(--gray)}
.fab{position:fixed;bottom:24px;right:20px;background:var(--gold);color:#fff;border:none;border-radius:30px;padding:14px 24px;font-size:18px;font-weight:700;cursor:pointer;z-index:200;box-shadow:0 6px 20px rgba(196,164,74,.4)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:88vh;overflow-y:auto;padding:24px;animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes popOut{from{opacity:1;transform:translate(-50%,-50%) scale(1)}to{opacity:0;transform:translate(-50%,-50%) scale(0.8)}}
@keyframes scrollLeft{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
.modal-close{float:right;font-size:24px;cursor:pointer;color:var(--gray);background:none;border:none}
.modal h2{font-size:20px;color:var(--navy);margin-bottom:14px}
.modal input,.modal textarea,.modal select{width:100%;padding:14px;border:2px solid var(--warm);border-radius:12px;font-size:16px;font-family:inherit;margin-bottom:10px;background:#FAFAFA}
.modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--gold);background:#fff}
.btn-submit{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer}.btn-submit:disabled{opacity:.6}
.pagination{display:flex;justify-content:center;gap:6px;padding:16px 0;flex-wrap:wrap}
.page-btn{padding:8px 14px;border:1px solid var(--warm);border-radius:8px;background:#fff;cursor:pointer;font-size:14px}.page-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}.page-btn:disabled{opacity:.3;cursor:default}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 28px;border-radius:25px;font-size:16px;z-index:99999;animation:fadeInOut 2.5s ease forwards}
@keyframes fadeInOut{0%{opacity:0;top:0}15%{opacity:1;top:20px}85%{opacity:1;top:20px}100%{opacity:0;top:0}}
.retry-btn{padding:10px 24px;background:var(--navy);color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;margin-top:8px}
.draft-notice{padding:4px 12px;background:rgba(196,164,74,.15);border-radius:8px;font-size:12px;color:var(--gold);display:none;margin-bottom:8px}
@media(max-width:480px){body{font-size:16px}.header h1{font-size:20px}.cat-grid{grid-template-columns:repeat(4,1fr);gap:6px}.cat-box{padding:12px 5px}.tab-btn{font-size:13px}}
</style>
</head>
<body>

<div class="header">
    <h1>🏫 老年大学同学之间</h1>
    <p class="sub">看通知、聊课程、找同伴 · <a href="/">← 返回主页</a></p>
    <button class="notify-btn" onclick="showNotifications()">🔔<span class="notify-badge" id="nBadge">0</span></button>
</div>

<div class="container">
<div class="user-strip">
    <div class="u-avatar" id="uAv" onclick="showProfile()">🐼</div>
    <div class="u-info"><div class="u-name" id="uName">游客</div><div class="u-meta" id="uMeta"></div></div>
    <div class="u-actions" id="uActs">
        <a class="u-action" id="myPostsLink" style="display:none" onclick="switchTab('mine')">📝 我的帖</a>
        <a class="u-action" id="myBkmLink" style="display:none" onclick="switchTab('bkm')">⭐ 收藏</a>
    </div>
    <button class="btn-sm guest" id="loginBtn" onclick="doLogin()">登录</button>
</div>

<div class="breadcrumb" id="breadcrumb"><a onclick="switchCat('all')">🏠 首页</a> › <span id="crumbName"></span></div>
<div class="online-bar" id="onlineBar">🌐 加载中...</div>

<div class="cat-grid" id="catGrid"></div>

<div class="card"><div class="sec-title">🔥 热门讨论</div><div id="hotPosts">加载中...</div></div>
<div class="card"><div class="sec-title">🌟 本月热心同学</div><div id="leaderboard">加载中...</div></div>
<div class="card" id="birthdayCard" style="display:none"><div class="sec-title">🎂 本月寿星</div><div id="birthdayList"></div></div>

<div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="switchTab('newest')">最新发言</button>
    <button class="tab-btn" onclick="switchTab('hot')">热门讨论</button>
    <button class="tab-btn" onclick="switchTab('mine')">我的帖子</button>
    <button class="tab-btn" onclick="switchTab('bkm')">我的收藏</button>
</div>
<div id="postList"><p id="initCheck" style="text-align:center;color:var(--gray);padding:40px">⏳ 正在加载，请稍候...</p></div>
<div id="pagination"></div>

<!-- Bottom Check-in -->
<div class="checkin-card" style="margin-top:20px">
    <h3>🌞 今日签到 <span id="checkinCount" style="font-size:14px;color:var(--gray)"></span></h3>
    <div style="overflow:hidden;height:28px;margin:8px 0;position:relative;font-size:14px;color:var(--gray)">
        <div id="checkinScroll" style="white-space:nowrap;position:absolute;animation:scrollLeft 20s linear infinite"></div>
    </div>
    <button class="mood-btn" onclick="doCheckin()" id="checkinBtn" style="font-size:17px;padding:12px 24px">✅ 今日签到</button>
    <div class="mood-picker" id="moodPicker" style="display:none">
        <span class="mood-btn" onclick="pickMood('😊','开心')">😊</span><span class="mood-btn" onclick="pickMood('😌','平静')">😌</span>
        <span class="mood-btn" onclick="pickMood('🥰','充实')">🥰</span><span class="mood-btn" onclick="pickMood('😴','有点累')">😴</span><span class="mood-btn" onclick="pickMood('🌹','想聊天')">🌹</span>
    </div>
</div>
<div id="debug" style="text-align:center;font-size:11px;color:#ccc"></div>
</div>

<button class="fab" onclick="showNewPost()">✏️ 我要发言</button>

<!-- Post Modal -->
<div class="modal-overlay" id="postModal"><div class="modal">
    <button class="modal-close" onclick="closeM('postModal')">✕</button>
    <h2>✏️ 我要发言</h2>
    <div class="draft-notice" id="draftNotice">💾 草稿已保存</div>
    <select id="postCat"><option value="">选择版块</option></select>
    <input id="postTitle" placeholder="标题（可选）" maxlength="100">
    <textarea id="postContent" rows="4" placeholder="说点什么吧..."></textarea>
    <input type="file" id="postImage" accept="image/*,.heic,.heif" style="font-size:14px">
    <p style="font-size:12px;color:var(--gray)">支持 JPG/PNG/HEIC</p>
    <button class="btn-submit" id="postSubmitBtn" onclick="submitPost()">发布</button>
</div></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal"><div class="modal" id="detailContent"></div></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('loginModal')">✕</button>
    <h2>👋 登录同学之间</h2>
    <p style="color:var(--gray);margin-bottom:16px">登录后才能发言、点赞和签到</p>
    <button onclick="loginGoogle()" style="width:100%;padding:16px;background:#fff;border:2px solid #ddd;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:12px">🌐 Google 登录</button>
    <div style="color:var(--gray);margin:16px 0">— 或 —</div>
    <input id="guestNickname" placeholder="输入昵称" maxlength="20" style="text-align:center;font-size:18px;padding:14px;width:100%;border:2px solid var(--warm);border-radius:12px;margin-bottom:8px">
    <button onclick="loginAsGuest()" style="width:100%;padding:16px;background:var(--warm);color:var(--navy);border:none;border-radius:12px;font-size:18px;font-weight:600;cursor:pointer">以游客身份浏览</button>
</div></div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('profileModal')">✕</button>
    <h2>✏️ 个人资料</h2>
    <div id="avatarPicker" style="font-size:34px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:12px"></div>
    <div id="profileStats" style="font-size:14px;color:var(--gray);margin:8px 0"></div>
    <div id="profileAchs" style="font-size:14px;color:var(--gold);margin:8px 0"></div>
    <input id="profileNickname" placeholder="昵称" maxlength="20" style="text-align:center;font-size:18px">
    <button onclick="setBirthday()" style="width:100%;padding:10px;background:var(--warm);border:none;border-radius:12px;font-size:14px;cursor:pointer;margin-bottom:8px">🎂 设置生日</button>
    <button onclick="saveProfile()" style="width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer">保存</button>
</div></div>

<!-- Notification Modal -->
<div class="modal-overlay" id="notifyModal"><div class="modal">
    <button class="modal-close" onclick="closeM('notifyModal')">✕</button>
    <h2>🔔 通知中心</h2><div id="notifyList"><p style="color:var(--gray)">暂无通知</p></div>
</div></div>

<!-- Birthday Modal -->
<div class="modal-overlay" id="birthModal"><div class="modal" style="text-align:center">
    <button class="modal-close" onclick="closeM('birthModal')">✕</button>
    <h2>🎂 选择生日月份</h2>
    <p id="birthSelected" style="color:var(--gold);font-size:18px;font-weight:700">请点击选择</p>
    <div id="birthGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:320px;margin:20px auto"></div>
    <button onclick="confirmBirth()" style="width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;margin-top:12px">✅ 确定</button>
</div></div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const API='https://nkvavgmvbmzrnwurazgq.supabase.co/rest/v1',KEY='sb_publishable_fOyq5agLNbcFEJ-LrpYa_w_C6rjQGxZ';
var me=null,cat='all',cats=[],posts=[],isAdmin=false,sbAuth=null,currentTab='newest',submitting=false;
var tempAvatar=null,selectedBirthMonth=null,totalPosts=0;

function $(id){return document.getElementById(id)}
function D(m){var e=$('debug');if(e)e.textContent='🔍 '+m}
function closeM(id){$(id).classList.remove('active')}
function toast(m){var e=$('toast');e.textContent=m;e.style.animation='none';e.offsetHeight;e.style.animation='fadeInOut 2.5s ease forwards'}
function ago(d){var s=(Date.now()-new Date(d).getTime())/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return new Date(d).toLocaleDateString('zh-CN')}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function emoji(s){var a=['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸'],h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return a[Math.abs(h)%a.length]}
function getSB(){if(!sbAuth&&window.supabase)sbAuth=window.supabase.createClient('https://nkvavgmvbmzrnwurazgq.supabase.co',KEY);return sbAuth}
function adelaideToday(){return new Date().toLocaleDateString('en-CA',{timeZone:'Australia/Adelaide'})}
function adelaideYesterday(){var d=new Date();d.setDate(d.getDate()-1);return d.toLocaleDateString('en-CA',{timeZone:'Australia/Adelaide'})}

async function api(path,opt){
    var ctrl=new AbortController(),t=setTimeout(function(){ctrl.abort()},8000);
    try{var r=await fetch(API+path,Object.assign({headers:{apikey:KEY,'Content-Type':'application/json','Cache-Control':'no-cache'},signal:ctrl.signal},opt||{}));clearTimeout(t);if(!r.ok)throw new Error(r.status);var ct=r.headers.get('content-type')||'';return ct.includes('json')?r.json():r.text()}catch(e){clearTimeout(t);throw e}
}

// ==================== AUTH ====================
async function checkGoogle(){
    var sb=getSB();if(!sb)return;
    try{var sess=await sb.auth.getSession();if(sess.data.session&&sess.data.session.user){
        var u=sess.data.session.user,saved=localStorage.getItem('f_user');
        if(saved){try{var p=JSON.parse(saved);if(p.login_type==='google'&&p.id===u.id){me=p;updateMe();return}}catch(e){}}
        me={id:u.id,nickname:u.user_metadata.full_name||u.email.split('@')[0]||'Google用户',login_type:'google',avatar_emoji:'🌐',points:0,total_posts:0,total_replies:0};
        localStorage.setItem('f_user',JSON.stringify(me));updateMe();
    }}catch(e){}
}
function checkAdmin(){if(me&&me.nickname==='sure')isAdmin=true}
async function loginGoogle(){
    var sb=getSB();if(!sb){toast('请刷新');return}
    try{var url=location.origin+location.pathname;
    var r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:url}});
    if(r.error){toast('❌ '+r.error.message);$('loginModal').innerHTML+='<p><button onclick="closeM(\'loginModal\')">返回论坛</button></p>'}}catch(e){toast('❌ 网络错误，请重试')}
}
function doLogin(){$('loginModal').classList.add('active')}
function loginAsGuest(){
    var n=$('guestNickname').value.trim();if(!n){toast('请输入昵称');return}
    me={nickname:n,login_type:'guest',avatar_emoji:emoji(n),points:parseInt(localStorage.getItem('f_points_'+n)||'0')};
    localStorage.setItem('f_user',JSON.stringify(me));checkAdmin();updateMe();closeM('loginModal');toast('👋 '+n+'！')
}
function requireLogin(){if(!me){doLogin();return false}return true}

// ==================== PROFILE ====================
function showProfile(){if(!me)return;$('profileNickname').value=me.nickname||'';tempAvatar=null;
    var av=['🐼','🐱','🐶','🐰','🦊','🐨','🐯','🐸','🐵','🐔','🦄','🌐'],isPhoto=me.avatar_emoji&&me.avatar_emoji.indexOf('data:')===0;
    $('avatarPicker').innerHTML=av.map(function(a){return'<span onclick="pickAv(\''+a+'\')" style="cursor:pointer;padding:4px;border-radius:8px;background:'+(!isPhoto&&me.avatar_emoji===a?'var(--gold)':'transparent')+'">'+a+'</span>'}).join('')+
    '<div id="photoPreview" style="margin-top:8px">'+(isPhoto?'<div style="padding:8px;background:var(--gold);border-radius:8px;font-size:14px">📷 当前照片 <span onclick="me.avatar_emoji=\'🐼\';showProfile()" style="cursor:pointer;margin-left:8px">✕</span></div>':'<div onclick="$(\'avFile\').click()" style="cursor:pointer;border:2px dashed var(--warm);border-radius:8px;padding:12px;font-size:15px">📷 上传照片</div>')+'</div><input type="file" id="avFile" accept="image/*" style="display:none" onchange="upAv(event)">';
    $('profileAchs').textContent='🏅 '+getAchievements().join(' ');
    var streak=parseInt(localStorage.getItem('f_checkin_streak_'+me.nickname)||'0');
    $('profileStats').innerHTML='加入：'+(me.created_at?ago(me.created_at):'今天')+' · 签到：'+streak+'天 · '+getRole();
    $('profileModal').classList.add('active');
}
function pickAv(a){me.avatar_emoji=a;tempAvatar=null;showProfile()}

var page=1,totalPages=1;

async function loadPosts(append){
    if(!append){page=1;totalPages=1}var list=$('postList');if(!append)list.innerHTML='<p style="text-align:center;color:var(--gray);padding:30px">加载中...</p>';
    var timeout=setTimeout(function(){list.innerHTML='<div style="text-align:center;padding:40px"><p>⏳ 超时</p><button class="retry-btn" onclick="loadPosts()">重试</button></div>'},8000);
    try{
        var col='created_at',dir='desc';if(currentTab==='hot'){col='reply_count';dir='desc'}
        var q='/posts?select=*&order=is_pinned.desc,'+col+'.'+dir+'&limit=20&offset='+((page-1)*20);
        if(currentTab==='mine'&&me)q+='&guest_nickname=eq.'+encodeURIComponent(me.nickname);
        if(cat!=='all')q+='&category_id=eq.'+cat;
        var data=await api(q);clearTimeout(timeout);
        posts=data||[];
        // Count total for pagination
        var cq='/posts?select=count';if(cat!=='all')cq+='&category_id=eq.'+cat;if(currentTab==='mine'&&me)cq+='&guest_nickname=eq.'+encodeURIComponent(me.nickname);
        try{var cr=await api(cq);totalPosts=cr[0].count;totalPages=Math.ceil(totalPosts/20)}catch(e){totalPages=1}
        
        if(!posts.length){list.innerHTML='<div style="text-align:center;padding:60px"><div style="font-size:48px">📝</div><p>还没有帖子，来发第一条吧</p></div>';$('pagination').innerHTML='';return}
        
        // Bookmark check
        var bkmSet={};if(me){var bkm=JSON.parse(localStorage.getItem('f_bkm_'+me.nickname)||'[]');bkm.forEach(function(id){bkmSet[id]=true})}
        
        list.innerHTML=posts.map(function(p){
            var c=cats.find(function(x){return x.id===p.category_id})||{name:'综合',icon:'💬'},isMine=me&&me.nickname===p.guest_nickname;
            var badges='';if(p.is_pinned)badges+='<span class="badge-pin">📌 置顶</span>';if(p.is_starred)badges+='<span class="badge-star">⭐ 精华</span>';if(p.is_locked)badges+='<span class="badge-lock">🔒 已关闭</span>';
            return '<div class="card post-card" onclick="showDetail('+p.id+')">'+
                '<div class="post-header"><div class="post-pavatar">'+pAv(p.guest_nickname||'')+'</div>'+
                '<div class="post-meta"><div class="post-author">'+esc(p.guest_nickname||'匿名')+(isMine?' <small style="color:var(--gold)">· 我</small>':'')+'</div>'+
                '<div class="post-time">'+ago(p.created_at)+' · '+c.icon+c.name+(badges?' <span class="post-badges">'+badges+'</span>':'')+'</div></div>'+
                (isAdmin||isMine?'<button onclick="event.stopPropagation();delPost('+p.id+')" style="float:right;background:none;border:none;font-size:18px;cursor:pointer">🗑</button>':'')+
                '</div><div class="post-title">'+esc(p.title||'无标题')+'</div>'+
                '<div class="post-preview">'+esc(p.content||'')+'</div>'+
                (p.image_url?'<img src="'+p.image_url+'" class="post-img" loading="lazy" onerror="this.style.display=\'none\'">':'')+
                '<div class="post-actions">'+
                '<button class="react-btn '+(isLiked(p.id)?'liked':'')+'" onclick="event.stopPropagation();toggleLike('+p.id+')">❤️ '+((p.likes||0))+'</button>'+
                '<span>💬 '+(p.reply_count||0)+'</span><span>👁 '+(p.views||0)+'</span>'+
                ((p.reply_count||0)>=10?'🔥':'')+((p.views||0)>=100?'⭐':'')+
                (bkmSet[p.id]?'<span style="font-size:13px">💾</span>':'')+
                '</div></div>';
        }).join('');
        
        // Pagination
        var ph='';if(totalPages>1){ph+='<div class="pagination">';for(var i=1;i<=totalPages;i++)ph+='<button class="page-btn'+(i===page?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';ph+='</div>'}
        $('pagination').innerHTML=ph;
    }catch(e){clearTimeout(timeout);list.innerHTML='<div style="text-align:center;padding:60px"><p>❌ 读取失败</p><button class="retry-btn" onclick="loadPosts()">重试</button></div>'}
}

// ==================== BOOKMARK ====================
function bookmarkPost(id){
    if(!requireLogin())return;var bkm=JSON.parse(localStorage.getItem('f_bkm_'+me.nickname)||'[]');
    var idx=bkm.indexOf(id);if(idx!==-1){bkm.splice(idx,1);toast('已取消收藏')}else{bkm.push(id);toast('⭐ 已收藏')}
    localStorage.setItem('f_bkm_'+me.nickname,JSON.stringify(bkm));showDetail(id);
}

// ==================== ADMIN ACTIONS ====================
async function togglePin(id){var p=posts.find(function(x){return x.id===id});if(!p)return;try{await api('/posts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({is_pinned:!p.is_pinned})});toast(p.is_pinned?'取消置顶':'已置顶');showDetail(id);loadPosts()}catch(e){}}
async function toggleStar(id){var p=posts.find(function(x){return x.id===id});if(!p)return;try{await api('/posts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({is_starred:!p.is_starred})});toast(p.is_starred?'取消精华':'已加精');showDetail(id)}catch(e){}}
async function toggleLock(id){var p=posts.find(function(x){return x.id===id});if(!p)return;try{await api('/posts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({is_locked:!p.is_locked})});toast(p.is_locked?'已解锁':'已锁帖');showDetail(id)}catch(e){}}
async function editPost(id){var p=posts.find(function(x){return x.id===id}),nc=prompt('编辑：',p?p.content:'');if(!nc)return;try{await api('/posts?id=eq.'+id,{method:'PATCH',body:JSON.stringify({content:nc})});toast('✅ 已更新');p.content=nc;showDetail(id)}catch(e){toast('❌')}}
async function delPost(id){if(!confirm('删除？'))return;var p=posts.find(function(x){return x.id===id});try{await fetch(API+'/replies?post_id=eq.'+id,{method:'DELETE',headers:{apikey:KEY}});await fetch(API+'/posts?id=eq.'+id,{method:'DELETE',headers:{apikey:KEY}});toast('🗑 已删除');if(p&&p.guest_nickname===me.nickname)deductPoints(2,'删除帖子');loadPosts();loadCatCounts()}catch(e){toast('❌')}}
function sharePost(id){var url=location.origin+location.pathname+'#'+id;if(navigator.clipboard){navigator.clipboard.writeText(url);toast('🔗 已复制')}else prompt('链接：',url)}
function reportPost(id){toast('🚩 已举报')}

// ==================== NOTIFICATIONS ====================
function addNotification(user,type,linkId,msg){
    if(!user||user===me.nickname)return;
    var list=JSON.parse(localStorage.getItem('f_ntfy_'+user)||'[]');
    list.unshift({type:type,linkId:linkId,msg:msg,time:new Date().toISOString(),read:false});
    if(list.length>50)list.length=50;localStorage.setItem('f_ntfy_'+user,JSON.stringify(list));
    updateNotifyBadge();
}
function updateNotifyBadge(){
    if(!me)return;var list=JSON.parse(localStorage.getItem('f_ntfy_'+me.nickname)||'[]'),unread=list.filter(function(n){return!n.read}).length;
    var b=$('nBadge');if(unread>0){b.style.display='flex';b.textContent=unread>99?'99+':unread}else b.style.display='none';
}
function showNotifications(){
    if(!me){doLogin();return}var list=JSON.parse(localStorage.getItem('f_ntfy_'+me.nickname)||'[]');
    if(!list.length){$('notifyList').innerHTML='<p style="color:var(--gray);text-align:center;padding:20px">🔔 暂无通知</p>'}else{
        $('notifyList').innerHTML=list.map(function(n){return'<div style="padding:12px;border-bottom:1px solid #f0f0f0;'+(n.read?'opacity:.5':'')+'" onclick="readNotify(\''+n.type+'\','+n.linkId+')">'+n.msg+'<div style="font-size:12px;color:var(--gray)">'+ago(new Date(n.time))+'</div></div>'}).join('');
        list.forEach(function(n){n.read=true});localStorage.setItem('f_ntfy_'+me.nickname,JSON.stringify(list));
    }
    $('notifyModal').classList.add('active');updateNotifyBadge();
}
function readNotify(type,linkId){if(linkId&&type==='reply')showDetail(parseInt(linkId));closeM('notifyModal')}

// ==================== POINTS & AWARDS ====================
function addPoints(amount,type,reason){
    if(!me||!me.nickname)return;me.points=(me.points||0)+amount;localStorage.setItem('f_user',JSON.stringify(me));
    var log=JSON.parse(localStorage.getItem('f_pointlog_'+me.nickname)||'[]');log.push({amount:amount,type:type,reason:reason,time:new Date().toISOString()});if(log.length>100)log.shift();localStorage.setItem('f_pointlog_'+me.nickname,JSON.stringify(log));updateMe();
}
function deductPoints(amount,reason){if(!me||!me.nickname)return;me.points=Math.max(0,(me.points||0)-amount);localStorage.setItem('f_user',JSON.stringify(me));updateMe()}

var ALL_AWARDS=[
    {id:'first_post',name:'第一次发言',icon:'✏️',check:function(){return(me&&me.total_posts||0)>=1}},
    {id:'streak_7',name:'坚持一周',icon:'🔥',check:function(){return parseInt(localStorage.getItem('f_checkin_streak_'+me.nickname)||'0')>=7}},
    {id:'streak_30',name:'月度坚持',icon:'💪',check:function(){return parseInt(localStorage.getItem('f_checkin_streak_'+me.nickname)||'0')>=30}},
    {id:'helper_10',name:'热心回复',icon:'💛',check:function(){return(me&&me.total_replies||0)>=10}},
    {id:'points_50',name:'活跃新星',icon:'🌟',check:function(){return(me&&me.points||0)>=50}},
    {id:'points_200',name:'校园常青',icon:'🌳',check:function(){return(me&&me.points||0)>=200}},
    {id:'bkm_5',name:'收藏家',icon:'💾',check:function(){return(me&&JSON.parse(localStorage.getItem('f_bkm_'+me.nickname)||'[]').length)>=5}},
];

function getAchievements(){return JSON.parse(localStorage.getItem('f_awards_'+me.nickname)||'[]')}
function checkAwards(){
    if(!me||!me.nickname)return[];var earned=getAchievements(),newList=[];
    ALL_AWARDS.forEach(function(a){if(!earned.find(function(e){return e.id===a.id})&&a.check()){earned.push({id:a.id,name:a.name,icon:a.icon,time:new Date().toISOString()});newList.push(a)}});
    if(newList.length){localStorage.setItem('f_awards_'+me.nickname,JSON.stringify(earned));updateMe();newList.forEach(function(a){addNotification(me.nickname,'award',0,'🎉 获得"'+a.name+'"奖牌！')})}
    return newList;
}

function showResult(title,points,awards){
    var ah='';if(awards&&awards.length)ah='<div style="margin-top:6px;font-size:14px">🏅 '+awards.map(function(a){return a.icon+a.name}).join(' ')+'</div>';
    var d=document.createElement('div');d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px 36px;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.2);z-index:999999;text-align:center;animation:popIn .35s ease';
    d.innerHTML='<div style="font-size:48px;margin-bottom:8px">🎉</div><div style="font-size:20px;font-weight:700;color:#2C3E50">'+title+'</div><div style="font-size:18px;color:#C4A44A;font-weight:700;margin:10px 0">'+points+'</div>'+ah;
    document.body.appendChild(d);setTimeout(function(){d.style.animation='popOut .25s ease forwards';setTimeout(function(){d.remove()},250)},2200);
}

// ==================== HOT & LB ====================
async function loadHot(){
    try{var data=await api('/posts?select=*&order=reply_count.desc&limit=5');
    $('hotPosts').innerHTML=data.length?data.map(function(p,i){return'<div onclick="showDetail('+p.id+')" style="padding:10px;cursor:pointer;border-bottom:1px solid #f0f0f0"><span style="font-size:18px;font-weight:900;color:'+(['#E74C3C','#E67E22','#F39C12'][i]||'var(--gray)')+'">'+(['🥇','🥈','🥉'][i]||(i+1))+'</span> '+esc(p.title||'无标题')+' <span style="font-size:13px;color:var(--gray)">💬'+(p.reply_count||0)+' · '+p.guest_nickname+'</span></div>'}).join(''):'<p style="color:var(--gray)">暂无热门</p>'}catch(e){$('hotPosts').innerHTML='<button class="retry-btn" onclick="loadHot()">重试</button>'}
}
async function loadLB(){
    try{var data=await api('/posts?select=guest_nickname&order=created_at.desc&limit=200'),counts={};data.forEach(function(p){if(p.guest_nickname)counts[p.guest_nickname]=(counts[p.guest_nickname]||0)+1});
    var sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1]}).slice(0,5);
    $('leaderboard').innerHTML=sorted.length?sorted.map(function(n,i){return'<div style="padding:5px 0;font-size:15px"><span style="font-size:20px">'+emoji(n[0])+'</span> '+n[0]+' <span style="color:var(--gray);font-size:13px">'+n[1]+'篇</span></div>'}).join(''):'<p style="color:var(--gray)">暂无</p>'}catch(e){$('leaderboard').innerHTML='<button class="retry-btn" onclick="loadLB()">重试</button>'}
}
async function loadCatCounts(){try{for(var i=1;i<=6;i++){var d=await api('/posts?select=count&category_id=eq.'+i);var el=document.getElementById('cnt'+i);if(el)el.textContent=d[0].count+'帖'}}catch(e){}}
async function loadOnline(){try{var d=await api('/posts?select=guest_nickname&order=created_at.desc&limit=50'),names=new Set();d.forEach(function(p){if(p.guest_nickname)names.add(p.guest_nickname)});$('onlineBar').innerHTML='🌐 最近活跃：'+names.size+'人'}catch(e){$('onlineBar').innerHTML='🌐 在线'}}

// ==================== BIRTHDAY ====================
function setBirthday(){selectedBirthMonth=null;$('birthSelected').textContent='请点击选择';var h='';for(var i=1;i<=12;i++)h+='<div id="bm'+i+'" onclick="pickBirth('+i+')" style="padding:18px;border-radius:14px;background:var(--warm);font-size:20px;font-weight:700;cursor:pointer">'+i+'月</div>';$('birthGrid').innerHTML=h;$('birthModal').classList.add('active')}
function pickBirth(m){selectedBirthMonth=m;$('birthSelected').textContent='已选：'+m+'月 🎂';for(var i=1;i<=12;i++){var el=$('bm'+i);if(el){el.style.background=i===m?'var(--gold)':'var(--warm)';el.style.color=i===m?'#fff':''}}}
function confirmBirth(){if(!selectedBirthMonth){toast('请先选择');return}localStorage.setItem('f_birth_'+me.nickname,selectedBirthMonth);closeM('birthModal');toast('🎂 已设置：'+selectedBirthMonth+'月');loadBirthdays()}
function loadBirthdays(){var m=new Date().getMonth()+1,bdays=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('f_birth_')===0&&parseInt(localStorage.getItem(k))===m)bdays.push(k.replace('f_birth_',''))}if(bdays.length){$('birthdayCard').style.display='block';$('birthdayList').innerHTML='<p>🎉 本月寿星：</p>'+bdays.map(function(n){return'🌹 '+n}).join('<br>')}}

// ==================== INIT ====================
(function(){
    var s=localStorage.getItem('f_user');if(s){me=JSON.parse(s);checkAdmin();updateMe()}
    checkGoogle().then(function(){if(!me)checkGoogle()}).catch(function(){});
    buildCats();
    Promise.all([loadPosts(),loadHot(),loadLB(),loadCheckin(),loadBirthdays(),loadCatCounts(),loadOnline()]);
    updateNotifyBadge();
    // Debug marker
    setTimeout(function(){D('V5 初始化完成 · 帖子:'+posts.length)},2000);
})();
</script>
