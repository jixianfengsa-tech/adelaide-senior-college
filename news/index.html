<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Events — Adelaide Chinese Senior College</title>
    <style>
        :root {
            --navy: #0A1628; --blue: #1B3A5C; --gold: #C4A44A;
            --white: #FFFFFF; --light: #F5F6F8; --gray: #6B7280;
            --text: #1F2937; --border: #E5E7EB; --radius: 8px;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--text); line-height: 1.7; background: var(--white);
        }
        .container{max-width:1100px;margin:0 auto;padding:0 24px}

        nav{
            position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px;
        }
        nav .container{display:flex;align-items:center;justify-content:space-between;height:64px}
        nav .brand{display:flex;align-items:center;gap:12px;text-decoration:none}
        nav .brand span{font-size:16px;font-weight:700;color:var(--navy)}

        .page-header{
            background: linear-gradient(160deg, #0A1628 0%, #132238 40%, #1B3A5C 100%);
            color:#fff; padding: 80px 0 60px; text-align:center;
        }
        .page-header h1{font-size:44px;font-weight:900;margin-bottom:8px}
        .page-header h1 span{color:var(--gold)}
        .page-header p{font-size:17px;color:rgba(255,255,255,0.7)}

        .news-list{padding:64px 0}
        .news-item{
            display:grid;grid-template-columns:280px 1fr;gap:32px;
            padding:32px 0;border-bottom:1px solid var(--border);align-items:start
        }
        .news-item:first-child{padding-top:0}
        .news-thumb{aspect-ratio:16/10;border-radius:var(--radius);overflow:hidden;background:var(--light)}
        .news-thumb img{width:100%;height:100%;object-fit:cover}
        .news-body .date{font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
        .news-body h2{font-size:22px;color:var(--navy);margin-bottom:8px}
        .news-body h2 a{color:inherit;text-decoration:none}
        .news-body h2 a:hover{color:var(--blue)}
        .news-body .summary{font-size:15px;color:var(--gray);margin-bottom:12px;line-height:1.7}
        .news-body .read-more{display:inline-block;color:var(--navy);font-weight:600;font-size:14px;text-decoration:none;padding:6px 18px;border:2px solid var(--navy);border-radius:4px;transition:all 0.3s}
        .news-body .read-more:hover{background:var(--navy);color:#fff}

        /* Detail modal */
        .modal-overlay{
            display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);
            z-index:9999;align-items:center;justify-content:center;padding:24px
        }
        .modal-overlay.active{display:flex}
        .modal{
            background:#fff;border-radius:12px;max-width:750px;width:100%;max-height:85vh;
            overflow-y:auto;padding:40px;position:relative
        }
        .modal-close{
            position:absolute;top:16px;right:20px;font-size:28px;cursor:pointer;
            color:var(--gray);background:none;border:none
        }
        .modal-close:hover{color:var(--navy)}
        .modal .date{font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
        .modal h2{font-size:28px;color:var(--navy);margin-bottom:20px}
        .modal .content{font-size:16px;line-height:1.9;color:var(--text)}
        .modal .content p{margin-bottom:14px}
        .modal .content ul{margin:12px 0 12px 24px}
        .modal .content li{margin-bottom:6px}

        footer{background:var(--navy);color:rgba(255,255,255,0.5);padding:32px 24px;text-align:center;font-size:13px}
        footer a{color:var(--gold);text-decoration:none}

        @media(max-width:768px){
            .page-header h1{font-size:30px}
            .news-item{grid-template-columns:1fr;gap:16px}
            .news-thumb{aspect-ratio:16/9}
            .modal{padding:24px}
        }
    </style>
</head>
<body>

<nav>
    <div class="container">
        <a href="/" class="brand"><span>← Adelaide Chinese Senior College</span></a>
    </div>
</nav>

<header class="page-header">
    <div class="container">
        <h1>News &amp; <span>Events</span></h1>
        <p>Latest updates, activities and achievements from our community</p>
    </div>
</header>

<section class="news-list">
    <div class="container" id="newsContainer">
        <p style="text-align:center;color:var(--gray);padding:40px">Loading news...</p>
    </div>
</section>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<footer>
    <div class="container">
        <p>Adelaide Chinese Senior College · SA ASIAN SENIOR LEARNING CENTRE INC · ABN 33 863 362 720</p>
        <p style="margin-top:4px"><a href="/">← Back to Home</a></p>
    </div>
</footer>

<script>
// Load news from JSON
fetch('data.json')
    .then(r => r.json())
    .then(news => {
        const container = document.getElementById('newsContainer');
        // Sort by date descending
        news.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        container.innerHTML = news.map(item => `
            <article class="news-item">
                <div class="news-thumb">
                    ${item.image ? `<img src="../${item.image}" alt="${item.title}" loading="lazy" onerror="this.style.display='none';this.parentElement.style.background='var(--light)'">` : ''}
                </div>
                <div class="news-body">
                    <div class="date">${formatDate(item.date)}</div>
                    <h2><a href="javascript:void(0)" onclick="openDetail('${item.id}')">${item.title}</a></h2>
                    <p class="summary">${item.summary}</p>
                    ${item.content ? `<a href="javascript:void(0)" class="read-more" onclick="openDetail('${item.id}')">Read more →</a>` : ''}
                </div>
            </article>
        `).join('');
        
        // Store for detail view
        window._newsData = news;
    })
    .catch(err => {
        document.getElementById('newsContainer').innerHTML = 
            '<p style="text-align:center;color:var(--gray);padding:40px">Unable to load news. Please try again later.</p>';
        console.error(err);
    });

function formatDate(dateStr) {
    const d = new Date(dateStr);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function openDetail(id) {
    const item = (window._newsData || []).find(n => n.id === id);
    if (!item) return;
    
    document.getElementById('modalContent').innerHTML = `
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="date">${formatDate(item.date)}</div>
        <h2>${item.title}</h2>
        ${item.image ? `<img src="../${item.image}" alt="${item.title}" style="width:100%;max-height:400px;object-fit:cover;border-radius:8px;margin-bottom:20px" onerror="this.style.display='none'">` : ''}
        <div class="content">${item.content || '<p>Full details coming soon.</p>'}</div>
    `;
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== document.getElementById('modalOverlay')) return;
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
});
</script>
</body>
</html>
